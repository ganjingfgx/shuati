<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎀 Kitty刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#FFF0F5;color:#5A3E46;min-height:100vh;overflow-x:hidden;padding-bottom:70px}
.bow{position:fixed;pointer-events:none;opacity:.1;z-index:0;animation:bowFloat linear infinite}
@keyframes bowFloat{0%{transform:translateY(-40px) rotate(0)}100%{transform:translateY(105vh) rotate(360deg)}}
.header{background:linear-gradient(135deg,#FF9EB1,#FF6B8B);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(255,107,139,.2)}
.header-title{flex:1;font-size:17px;font-weight:800;color:#fff}
.header button{background:rgba(255,255,255,.2);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.content{max-width:500px;margin:0 auto;padding:12px 14px;position:relative;z-index:1}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;border:1.5px solid #FFD1DC;box-shadow:0 2px 8px rgba(255,158,177,.08)}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-item{flex:1;background:#fff;border-radius:14px;padding:10px;text-align:center;border:1.5px solid #FFD1DC}
.stat-val{font-size:20px;font-weight:900;color:#FF6B8B}
.stat-label{font-size:10px;color:#997A83;font-weight:700}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cat-card{background:#fff;border-radius:16px;padding:14px;text-align:center;cursor:pointer;border:1.5px solid #FFD1DC;transition:all .2s}
.cat-card:active{transform:scale(.97);background:#FFF5F8}
.cat-icon{font-size:28px;margin-bottom:4px}
.cat-name{font-size:14px;font-weight:800}
.cat-count{font-size:11px;color:#997A83;margin-top:2px}
.section-title{font-size:13px;font-weight:800;color:#997A83;margin:16px 0 8px;padding-left:4px}
.mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.mode-btn{flex:1;min-width:70px;padding:10px 6px;border-radius:14px;border:1.5px solid #FFD1DC;background:#fff;font-size:12px;font-weight:700;color:#5A3E46;cursor:pointer;text-align:center;transition:all .2s}
.mode-btn:active,.mode-btn.active{background:#FF9EB1;color:#fff;border-color:#FF9EB1}
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.quiz-header button{background:#fff;border:1.5px solid #FFD1DC;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#5A3E46;cursor:pointer}
.quiz-type{font-size:11px;font-weight:800;padding:3px 10px;border-radius:10px;color:#fff;display:inline-block}
.quiz-type.single{background:#FF9EB1}.quiz-type.multi{background:#98D8AA;color:#5A3E46}.quiz-type.judge{background:#FFB347}.quiz-type.calc{background:#87CEEB;color:#5A3E46}
.quiz-counter{flex:1;text-align:center;font-size:14px;font-weight:800;color:#FF6B8B}
.quiz-question{font-size:15px;font-weight:700;line-height:1.8;margin-bottom:14px}
.opt-btn{display:block;width:100%;padding:12px 14px;margin-bottom:8px;border-radius:14px;text-align:left;font-size:14px;font-weight:600;background:#fff;border:1.5px solid #FFD1DC;color:#5A3E46;cursor:pointer;transition:all .15s;line-height:1.5}
.opt-btn:active{transform:scale(.98)}.opt-btn.selected{border-color:#FF9EB1;background:#FFF0F5}
.opt-btn.correct{border-color:#98D8AA;background:rgba(152,216,170,.15);color:#3d8b5e}
.opt-btn.wrong{border-color:#FF8787;background:rgba(255,135,135,.15);color:#c0392b}
.opt-btn.show-correct{border-color:#98D8AA;background:rgba(152,216,170,.1)}
.confirm-btn{display:block;width:100%;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#FF9EB1,#FF6B8B);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.auto-bar{height:3px;background:rgba(255,158,177,.15);border-radius:2px;margin:10px 0;overflow:hidden}
.auto-bar-fill{height:100%;background:linear-gradient(90deg,#FF9EB1,#FF6B8B);border-radius:2px;animation:countdown 1.5s linear forwards}
@keyframes countdown{from{width:100%}to{width:0}}
.explain-box{border-radius:14px;padding:14px;margin-top:10px;border:1.5px solid;font-size:13px;line-height:1.7}
.explain-box.correct-box{background:rgba(152,216,170,.08);border-color:rgba(152,216,170,.3)}
.explain-box.wrong-box{background:rgba(255,135,135,.08);border-color:rgba(255,135,135,.3)}
.explain-box .et{font-weight:800;margin-bottom:4px}
.feedback{text-align:center;font-size:15px;font-weight:800;margin:10px 0;animation:fadeUp .3s ease}
.feedback.ok{color:#3d8b5e}.feedback.no{color:#c0392b}
.show-sol-btn{display:block;width:100%;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,#87CEEB,#6BB3D9);color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:10px}
.self-mark{display:flex;gap:8px;margin-top:10px}
.self-mark button{flex:1;padding:10px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(90,62,70,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#FFF0F5;border-radius:18px 18px 0 0;width:100%;max-width:500px;max-height:70vh;overflow-y:auto;padding:18px;animation:slideUp .25s ease}
.modal-box h3{font-size:16px;font-weight:800;color:#FF6B8B;margin-bottom:12px;text-align:center}
.ans-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.ans-cell{aspect-ratio:1;border-radius:8px;border:1.5px solid #FFD1DC;background:#fff;font-size:11px;font-weight:800;color:#5A3E46;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ans-cell.cur{border-color:#FF6B8B;background:#FFE4EA}.ans-cell.ok{background:#98D8AA;border-color:#98D8AA;color:#fff}.ans-cell.ng{background:#FF8787;border-color:#FF8787;color:#fff}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid #FFD1DC;padding:8px 14px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:8px;z-index:50}
.nav-bar button{flex:1;padding:10px;border:none;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer}
.np{background:#FFF0F5;color:#FF6B8B;border:1.5px solid #FFD1DC!important}
.nn{background:linear-gradient(135deg,#FF9EB1,#FF6B8B);color:#fff!important}
.ns{background:linear-gradient(135deg,#FFB347,#FF9F43);color:#fff!important}
.toggle-row{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#997A83}
.tsw{position:relative;width:34px;height:18px;border-radius:9px;background:#ddd;cursor:pointer;transition:background .2s;flex-shrink:0}
.tsw.on{background:#FF9EB1}.tsw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}.tsw.on::after{left:18px}
.hp{position:fixed;pointer-events:none;z-index:200;font-size:20px;color:#FF9EB1;animation:heartUp 1s ease-out forwards}
@keyframes heartUp{0%{opacity:1;transform:translateY(0) scale(.5)}50%{opacity:.8;transform:translateY(-50px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.shake{animation:shake .4s ease}
.ss{text-align:center;font-size:56px;font-weight:900;color:#FF6B8B;margin:10px 0}
.sl2{text-align:center;font-size:13px;color:#997A83;font-weight:700;margin-bottom:14px}
.sr{display:flex;gap:8px;margin-bottom:14px}.si{flex:1;background:#fff;border-radius:14px;padding:12px;text-align:center;border:1.5px solid #FFD1DC}.si .sv{font-size:20px;font-weight:900}.si .sl{font-size:11px;color:#997A83;font-weight:700;margin-top:2px}
.bm-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:#997A83;cursor:pointer;padding:4px 10px;border-radius:20px;border:1.5px solid #FFD1DC;background:#fff;transition:all .2s;margin-bottom:10px}
.bm-btn.on{color:#FF9EB1;border-color:#FF9EB1;background:#FFF0F5}
</style>
</head>
<body>
<div class="bow" style="left:5%;animation-duration:18s;font-size:18px">🎀</div>
<div class="bow" style="left:22%;animation-duration:23s;animation-delay:4s;font-size:14px">🎀</div>
<div class="bow" style="left:45%;animation-duration:16s;animation-delay:7s;font-size:20px">🎀</div>
<div class="bow" style="left:68%;animation-duration:26s;animation-delay:2s;font-size:16px">🎀</div>
<div class="bow" style="left:88%;animation-duration:20s;animation-delay:9s;font-size:13px">🎀</div>
<div id="app"></div>
<script>
/* ========== QUESTION DATA (修正完整版) ========== */
const S=[
['下列不属于债务筹资方式的是（ ）。',['A.企业自留资金','B.发行公司债券','C.融资租赁','D.利用商业信用'],'A','企业自留资金（留存收益）属于权益筹资，非债务筹资。'],
['按发行对象和上市地区，可将股票分为A股、B股、H股和N股等。下列说法不正确的是（ ）。',['A.A股是以人民币标明票面金额并以人民币认购和交易的股票','B.B股是以外币标明票面金额并以外币认购和交易的股票','C.H股为在香港上市的股票','D.N股是在纽约上市的股票'],'B','B股以人民币标明票面金额，但以外币认购和交易。'],
['普通股股东的权利不包括（ ）。',['A.公司管理权','B.分享盈余权','C.优先认股权','D.优先分配剩余财产权'],'D','优先分配剩余财产权是优先股股东的权利。'],
['下列关于普通股筹资的说法不正确的是（ ）。',['A.筹资风险大','B.能增加公司的信誉','C.筹资限制较少','D.容易分散控制权'],'A','普通股无需还本付息，筹资风险小，而非“大”。'],
['下列关于融资租赁的说法不正确的是（ ）。',['A.包括售后租回、直接租赁和杠杆租赁三种形式','B.从承租人的角度来看，杠杆租赁与其他租赁形式并无区别','C.从出租人的角度来看，杠杆租赁与其他租赁形式并无区别','D.在杠杆租赁中，如果出租人不能按期偿还借款，资产的所有权就要转归资金的出借者'],'C','从出租人角度看，杠杆租赁涉及三方（出租人、承租人、贷款人），与其他形式有显著区别。'],
['某企业与银行商定的周转信贷额为200万元，承诺费率为0.5%，企业借款150万元，平均使用8个月，那么，借款企业向银行支付承诺费（ ）元。',['A.10000','B.6000','C.5000','D.8000'],'C','年度平均使用额=150×(8/12)=100万元；未使用=200-100=100万元；承诺费=100×0.5%=0.5万元=5000元。'],
['下列关于综合资金成本的说法不正确的是（ ）。',['A.包括加权平均资金成本和边际资金成本','B.边际资金成本采用加权平均法计算，其权数为账面价值权数','C.当企业拟筹资进行某项目投资时，应以边际资金成本作为评价该投资项目可行性的经济指标','D.边际资金成本，是指资金每增加一个单位而增加的成本'],'B','边际资金成本的权数应为市场价值权数，而非账面价值权数。'],
['已知企业目标资本结构中长期债务的比重为20%，债务资金的增加额在0~10000元范围内，其利率维持5%不变。该企业与此相关的筹资总额分界点为（ ）元。',['A.5000','B.20000','C.50000','D.200000'],'C','筹资总额分界点=10000/20%=50000元。'],
['在实务中，计算加权平均资金成本时通常采用的权数为（ ）。',['A.目标价值权数','B.市场价值权数','C.账面价值权数','D.评估价值权数'],'C','实务中常用账面价值权数，因其数据易于取得。'],
['某企业希望在筹资计划中确定期望的加权平均资金成本，为此需要计算个别资金占全部资金的比重。此时，最适宜采用的计算基础是（ ）。',['A.目前的账面价值','B.目前的市场价值','C.预计的账面价值','D.目标市场价值'],'D','确定期望的加权平均成本，应采用目标市场价值权数，反映未来筹资目标。'],
['A企业负债资金的市场价值为4000万元，股东权益的市场价值为6000万元。债务的税前资金成本为15%，股票的β为1.41，企业所得税税率为34%，市场风险溢酬9.2%，国债的利率为11%。则加权平均资金成本为（ ）。',['A.23.97%','B.9.9%','C.18.34%','D.18.67%'],'C','债务税后成本=15%×(1-34%)=9.9%；权益成本=11%+1.41×9.2%=23.972%；WACC=4000/10000×9.9%+6000/10000×23.972%≈18.34%。'],
['某企业生产一种产品，该产品的年产销量为20000件，售价为40元/件，单位变动成本为20元，则该产品的边际贡献总额是（ ）元。',['A.200000','B.120000','C.400000','D.800000'],'C','边际贡献总额=20000×(40-20)=400000元。'],
['普通股每股税后利润变动率相当于息税前利润变动率的倍数表示的是（ ）。',['A.经营杠杆系数','B.财务杠杆系数','C.复合杠杆系数','D.以上均错'],'B','财务杠杆系数=普通股每股利润变动率/息税前利润变动率。'],
['企业在经营决策时对经营成本中固定成本的利用称为（ ）。',['A.财务杠杆','B.总杠杆','C.联合杠杆','D.营业杠杆'],'D','经营杠杆（营业杠杆）源于固定经营成本的存在。'],
['下列关于经营杠杆的说法不正确的是（ ）。',['A.经营杠杆，是指由于固定成本的存在而导致税前利润变动率大于产销量变动率的杠杆效应','B.经营杠杆本身并不是利润不稳定的根源，但是经营杠杆扩大了市场和生产等不确定因素对利润变动的影响','C.在其他因素一定的情况下，固定成本越高，经营杠杆系数越大','D.按照简化公式计算经营杠杆系数时，本期边际贡献的大小并不影响本期的经营杠杆系数'],'D','简化公式 DOL = 基期边际贡献/基期息税前利润，本期边际贡献直接影响本期DOL。'],
['某公司的经营杠杆系数为2，预计息税前盈余将增长10%，在其他条件不变的情况下，销售量将增长（ ）。',['A.5%','B.10%','C.15%','D.20%'],'A','DOL=EBIT变动率/销售量变动率，2=10%/销售量变动率→销售量变动率=5%。'],
['如果企业一定期间内的固定生产经营成本和固定财务费用均不为零，则由上述因素共同作用而导致的杠杆效应属于（ ）。',['A.经营杠杆效应','B.财务杠杆效应','C.复合杠杆效应','D.风险杠杆效应'],'C','固定经营成本+固定财务费用同时存在，产生复合杠杆（总杠杆）效应。'],
['某公司总资本额度为100万元，负债比率为40%，利率为10%，当销售收入为120万元时，EBIT为20万元，则财务杠杆系数为（ ）。',['A.1.2','B.1.25','C.1.5','D.2'],'B','I=100×40%×10%=4；DFL=20/(20-4)=1.25。'],
['某企业全部资本150万元，所有权资本占55%，负债利率12%，当销售额为100万元时，EBIT为20万元，则财务杠杆系数为（ ）。',['A.1.68','B.2.5','C.1.15','D.2'],'A','负债=150×(1-55%)=67.5万元；I=67.5×12%=8.1万元；DFL=20/(20-8.1)≈1.68。'],
['用未来报酬的总现值，减去投资额的总现值，计算出（ ）。',['A.投资利润率','B.投资回收期','C.获利指数','D.净现值'],'D','净现值（NPV）=未来报酬总现值-投资额总现值。'],
['某投资方案，当折现率为16%时，其净现值为338元；当折现率为18%时，其净现值为-22元。该方案的内含报酬率为（ ）。',['A.15.88%','B.16.3%','C.17.88%','D.18.1%'],'C','IRR=16%+[338/(338+22)]×(18%-16%)≈17.88%。'],
['某企业准备进行一个固定资产投资项目，有效使用期为4年，无残值，总共投资120万元。这个项目在使用期内每年净利润为20万元，该项目的投资回收期为（ ）。',['A.4年','B.6年','C.2.4年','D.3年'],'C','年折旧=120/4=30万元；年现金流量=20+30=50万元；回收期=120/50=2.4年。'],
['计量投资方案的增量现金流量时，一般不需要考虑方案（ ）。',['A.可能的未来成本','B.之间的差额成本','C.有关的机会成本','D.动用现有资产的账面成本'],'D','账面成本属于沉没成本，不应考虑。'],
['关于项目投资，下列表达式不正确的是（ ）。',['A.计算期=建设期+运营期','B.运营期=试产期+达产期','C.达产期是指从投产至达到设计预期水平的时期','D.从投产日到终结点之间的时间间隔称为运营期'],'C','试产期是指从投产至达到设计预期水平的时期，达产期是指达到设计水平后的时期。'],
['计算投资项目现金流量时，下列说法不正确的是（ ）。',['A.必须考虑现金流量的增量','B.尽量利用未来的会计利润数据','C.不能考虑沉没成本因素','D.考虑项目对企业其他部门的影响'],'B','应基于现金流量而非会计利润进行决策。'],

const allQ = [
  ...S.map((d,i)=>({id:'s'+i,t:'single',q:d[0],o:d[1],a:d[2],e:d[3]})),
  ...M.map((d,i)=>({id:'m'+i,t:'multi',q:d[0],o:d[1],a:d[2],e:d[3]})),
  ...J.map((d,i)=>({id:'j'+i,t:'judge',q:d[0],o:d[1],a:d[2],e:d[3]})),
  ...C.map((d,i)=>({id:'c'+i,t:'calc',q:d[0],o:d[1],a:d[2],e:d[3]}))
];
const CATS = {
  '全部题库': allQ,
  '单选题': allQ.filter(q=>q.t==='single'),
  '多选题': allQ.filter(q=>q.t==='multi'),
  '判断题': allQ.filter(q=>q.t==='judge'),
  '计算题': allQ.filter(q=>q.t==='calc'),
  '错题本': [],
  '收藏夹': []
};

/* ========== STATE ========== */
const LS='kittyQ_';
let view='home', quiz=[], qidx=0, answers={}, multiSel=new Set(), autoTimer=null;
let autoAdv=true, showSol={}, selfMark={};
let stats=load('stats',{total:0,correct:0,streak:0,best:0,days:0,lastD:''});
let wrongSet=new Set(load('wrong',[]));
let bookSet=new Set(load('book',[]));
let history=load('hist',[]);

function load(k,d){try{const v=localStorage.getItem(LS+k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch(e){}}
function saveAll(){save('stats',stats);save('wrong',[...wrongSet]);save('book',[...bookSet]);save('hist',history)}
function today(){return new Date().toISOString().slice(0,10)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function rate(){return stats.total?Math.round(stats.correct/stats.total*100):0}

/* Init streak */
(function(){const t=today();if(stats.lastD&&stats.lastD!==t){const d=Math.round((new Date(t)-new Date(stats.lastD))/864e5);stats.streak=d===1?stats.streak:0}if(stats.lastD!==t){stats.streak+=1;stats.lastD=t}saveAll()})();

/* ========== RENDER ========== */
const $=s=>document.getElementById(s)||document.querySelector(s);
const app=$('app');

function render(){
  if(view==='home') renderHome();
  else if(view==='quiz') renderQuiz();
  else if(view==='summary') renderSummary();
}

function renderHome(){
  CATS['错题本']=[...wrongSet].map(id=>allQ.find(q=>q.id===id)).filter(Boolean);
  CATS['收藏夹']=[...bookSet].map(id=>allQ.find(q=>q.id===id)).filter(Boolean);
  app.innerHTML=`
  <div class="header">
    <span class="header-title">🎀 Kitty刷题</span>
    <button onclick="resetStats()">重置统计</button>
  </div>
  <div class="content">
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-val">${stats.total}</div><div class="stat-label">总刷题</div></div>
      <div class="stat-item"><div class="stat-val">${rate()}%</div><div class="stat-label">正确率</div></div>
      <div class="stat-item"><div class="stat-val">${stats.streak}🔥</div><div class="stat-label">连续天数</div></div>
    </div>
    <div class="section-title">选择题库</div>
    <div class="cat-grid">
      ${Object.entries(CATS).map(([name,qs])=>{
        const icons={'全部题库':'📚','单选题':'📝','多选题':'☑️','判断题':'✅','计算题':'🔢','错题本':'❌','收藏夹':'⭐'};
        return `<div class="cat-card" onclick="startQuiz('${name}')">
          <div class="cat-icon">${icons[name]||'📖'}</div>
          <div class="cat-name">${name}</div>
          <div class="cat-count">${qs.length}题</div></div>`;
      }).join('')}
    </div>
    <div class="section-title">刷题模式</div>
    <div class="mode-row">
      <div class="mode-btn" onclick="startRandom()">🎲 随机20题</div>
      <div class="mode-btn" onclick="startWrong()">❌ 错题重练</div>
      <div class="mode-btn" onclick="startBook()">⭐ 收藏复习</div>
    </div>
    ${history.length?`<div class="section-title">最近记录</div>
    ${history.slice(0,5).map(h=>`<div class="card" style="padding:10px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-weight:800">${h.name}</div><div style="font-size:11px;color:#997A83">${h.date}</div></div>
      <div style="font-size:18px;font-weight:900;color:${h.pct>=80?'#98D8AA':h.pct>=60?'#FFB347':'#FF8787'}">${h.pct}%</div>
    </div>`).join('')}`:''}
  </div>`;
}

function startQuiz(name){
  const qs=CATS[name];
  if(!qs||!qs.length){alert('该题库暂无题目');return}
  quiz=[...qs];qidx=0;answers={};multiSel=new Set();showSol={};selfMark={};view='quiz';
  clearTimeout(autoTimer);render();
}
function startRandom(){quiz=shuffle(allQ).slice(0,20);qidx=0;answers={};multiSel=new Set();showSol={};selfMark={};view='quiz';clearTimeout(autoTimer);render()}
function startWrong(){
  const qs=[...wrongSet].map(id=>allQ.find(q=>q.id===id)).filter(Boolean);
  if(!qs.length){alert('错题本为空');return}
  quiz=shuffle(qs);qidx=0;answers={};multiSel=new Set();showSol={};selfMark={};view='quiz';clearTimeout(autoTimer);render();
}
function startBook(){
  const qs=[...bookSet].map(id=>allQ.find(q=>q.id===id)).filter(Boolean);
  if(!qs.length){alert('收藏夹为空');return}
  quiz=[...qs];qidx=0;answers={};multiSel=new Set();showSol={};selfMark={};view='quiz';clearTimeout(autoTimer);render();
}

function renderQuiz(){
  if(!quiz.length){view='home';render();return}
  const q=quiz[qidx];
  const ans=answers[q.id];
  const isA=!!ans;
  const isB=bookSet.has(q.id);
  const tLabel={single:'单选',multi:'多选',judge:'判断',calc:'计算'}[q.t]||q.t;
  const tClass=q.t;

  let html=`<div class="header">
    <button onclick="goHome()">🏠 首页</button>
    <span class="header-title">🎀 刷题中</span>
    <button onclick="showCard()">📋</button>
  </div>
  <div class="content">
    <div class="quiz-header">
      <span class="quiz-type ${tClass}">${tLabel}</span>
      <span class="quiz-counter">${qidx+1} / ${quiz.length}</span>
      <div class="toggle-row" onclick="toggleAuto()">
        <span>自动跳转</span>
        <div class="tsw ${autoAdv?'on':''}"></div>
      </div>
    </div>
    <div class="bm-btn ${isB?'on':''}" onclick="toggleBook('${q.id}')">${isB?'⭐ 已收藏':'☆ 收藏'}</div>
    <div class="quiz-question">${q.q}</div>`;

  // Options
  if(q.t==='single'||q.t==='multi'||q.t==='judge'){
    q.o.forEach(opt=>{
      const letter=opt.charAt(0);
      let cls='opt-btn';
      if(isA){
        if(q.t==='single'||q.t==='judge'){
          if(ans.sel===letter) cls+=ans.ok?' correct':' wrong';
          if(letter===q.a&&ans.sel!==letter) cls+=' show-correct';
        }else{
          const ca=q.a.split('');
          if(ca.includes(letter)) cls+=' correct';
          else if(ans.sel.includes(letter)&&!ca.includes(letter)) cls+=' wrong';
        }
      }else if(q.t==='multi'&&multiSel.has(letter)){
        cls+=' selected';
      }
      const oc=isA?'':q.t==='multi'?
        `onclick="toggleMulti('${letter}')"`:
        `onclick="selectOpt('${letter}','${q.t}','${q.id}')"`;
      html+=`<button class="${cls}" ${isA?'disabled':''} ${oc}>${opt}</button>`;
    });
    if(q.t==='multi'&&!isA&&multiSel.size>0){
      html+=`<button class="confirm-btn" onclick="submitMulti('${q.id}')">确认提交 (${multiSel.size}项)</button>`;
    }
  }

  // Calc
  if(q.t==='calc'){
    if(!isA){
      html+=`<button class="show-sol-btn" onclick="showSolution('${q.id}')">📖 查看解析与答案</button>`;
    }
  }

  // Feedback
  if(isA&&q.t!=='calc'){
    const fb=ans.ok?'✔ 回答正确！':'✘ 回答错误';
    const fc=ans.ok?'ok':'no';
    html+=`<div class="feedback ${fc}">${fb}</div>`;
    if(ans.ok&&autoAdv) html+=`<div class="auto-bar"><div class="auto-bar-fill"></div></div>`;
  }

  // Self-mark for calc
  if(isA&&q.t==='calc'&&selfMark[q.id]===undefined){
    html+=`<div class="self-mark">
      <button style="background:#98D8AA;color:#fff" onclick="markSelf('${q.id}',true)">✔ 我做对了</button>
      <button style="background:#FF8787;color:#fff" onclick="markSelf('${q.id}',false)">✘ 我做错了</button>
    </div>`;
  }

  // Explanation
  if(isA&&q.t!=='calc'){
    html+=`<div class="explain-box ${ans.ok?'correct-box':'wrong-box'}">
      <div class="et">${ans?'💡 解析':''}</div>
      <div>${q.e||'暂无解析'}</div></div>`;
  }

  // Calc solution
  if((isA||showSol[q.id])&&q.t==='calc'){
    html+=`<div class="explain-box correct-box">
      <div class="et">📝 详细解答</div>
      <div style="white-space:pre-wrap">${q.e||'暂无解析'}</div>
      <div style="margin-top:8px;font-weight:800;color:#FF6B8B">正确答案：${q.a}</div></div>`;
  }

  // Nav
  html+=`<div style="display:flex;gap:8px;margin-top:14px;padding-bottom:10px">
    <button class="mode-btn" style="flex:1" onclick="prevQ()">⬅ 上一题</button>
    <button class="mode-btn" style="flex:1;${qidx===quiz.length-1?'background:#FFB347;color:#fff':''}" onclick="nextQ()">${qidx===quiz.length-1?'📊 交卷':'下一题 ➡'}</button>
  </div></div>`;

  app.innerHTML=html;

  // Shake on wrong
  if(isA&&!ans.ok&&q.t!=='calc'){
    const opts=app.querySelectorAll('.opt-btn.wrong');
    opts.forEach(o=>o.classList.add('shake'));
  }

  // Auto advance
  if(isA&&ans.ok&&autoAdv&&q.t!=='calc'){
    if(autoTimer) clearTimeout(autoTimer);
    autoTimer=setTimeout(()=>{
      if(qidx<quiz.length-1){qidx++;multiSel=new Set();renderQuiz()}
      else finishQuiz()
    },1500);
  }
}

function selectOpt(letter,t,qid){
  if(answers[qid]) return;
  const q=quiz.find(x=>x.id===qid)||allQ.find(x=>x.id===qid);
  if(!q) return;
  const ok=letter===q.a;
  answers[qid]={sel:letter,ok};
  stats.total++;
  if(ok){stats.correct++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak}
  else{stats.streak=0;wrongSet.add(qid)}
  stats.lastD=today();saveAll();renderQuiz();
}
function toggleMulti(letter){if(multiSel.has(letter))multiSel.delete(letter);else multiSel.add(letter);renderQuiz()}
function submitMulti(qid){
  if(answers[qid]) return;
  const q=quiz.find(x=>x.id===qid);
  const sel=[...multiSel].sort().join('');
  const ok=sel===q.a;
  answers[qid]={sel,ok};
  stats.total++;
  if(ok){stats.correct++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak}
  else{stats.streak=0;wrongSet.add(qid)}
  stats.lastD=today();saveAll();renderQuiz();
}
function showSolution(qid){showSol[qid]=true;renderQuiz()}
function markSelf(qid,ok){
  selfMark[qid]=ok;
  const q=quiz.find(x=>x.id===qid);
  answers[qid]={sel:ok?'正确':'错误',ok};
  stats.total++;
  if(ok){stats.correct++;stats.streak++;if(stats.streak>stats.best)stats.best=stats.streak}
  else{stats.streak=0;wrongSet.add(qid)}
  stats.lastD=today();saveAll();renderQuiz();
}
function prevQ(){clearTimeout(autoTimer);if(qidx>0){qidx--;multiSel=new Set();renderQuiz()}}
function nextQ(){clearTimeout(autoTimer);if(qidx<quiz.length-1){qidx++;multiSel=new Set();renderQuiz()}else finishQuiz()}
function goHome(){clearTimeout(autoTimer);view='home';render()}
function toggleAuto(){autoAdv=!autoAdv;renderQuiz()}
function toggleBook(id){if(bookSet.has(id))bookSet.delete(id);else bookSet.add(id);save('book',[...bookSet]);renderQuiz()}

function finishQuiz(){
  clearTimeout(autoTimer);
  let c=0;Object.values(answers).forEach(a=>{if(a.ok)c++});
  const pct=quiz.length?Math.round(c/quiz.length*100):0;
  history.unshift({name:'刷题',date:today(),total:quiz.length,correct:c,pct});
  if(history.length>30)history.length=30;
  saveAll();view='summary';render();
}

function renderSummary(){
  let c=0;Object.values(answers).forEach(a=>{if(a.ok)c++});
  const t=quiz.length,pct=t?Math.round(c/t*100):0;
  const clr=pct>=80?'#98D8AA':pct>=60?'#FFB347':'#FF8787';
  app.innerHTML=`
  <div class="header"><button onclick="goHome()">🏠 首页</button><span class="header-title">🎀 答题报告</span><span></span></div>
  <div class="content">
    <div class="card" style="text-align:center">
      <div style="font-size:13px;color:#997A83;font-weight:700">正确率</div>
      <div class="ss" style="color:${clr}">${pct}%</div>
      <div class="sr">
        <div class="si"><div class="sv" style="color:#FF6B8B">${t}</div><div class="sl">总题数</div></div>
        <div class="si"><div class="sv" style="color:#98D8AA">${c}</div><div class="sl">正确</div></div>
        <div class="si"><div class="sv" style="color:#FF8787">${t-c}</div><div class="sl">错误</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="mode-btn" style="flex:1" onclick="goHome()">返回首页</button>
        <button class="mode-btn" style="flex:1;background:#FF9EB1;color:#fff;border-color:#FF9EB1" onclick="startQuiz('全部题库')">再做一套</button>
      </div>
    </div>
  </div>`;
}

function showCard(){
  const ov=document.createElement('div');
  ov.className='modal-bg';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal-box">
    <h3>📋 答题卡 (${quiz.length}题)</h3>
    <div class="ans-grid">
      ${quiz.map((q,i)=>{
        const a=answers[q.id];
        let cls='';
        if(i===qidx) cls='cur';
        else if(a&&a.ok) cls='ok';
        else if(a&&!a.ok) cls='ng';
        return `<div class="ans-cell ${cls}" onclick="jumpQ(${i});this.closest('.modal-bg').remove()">${i+1}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:11px;font-weight:700">
      <span>⬜ 未答</span><span style="color:#98D8AA">🟩 正确</span><span style="color:#FF8787">🟥 错误</span>
    </div>
  </div>`;
  document.body.appendChild(ov);
}
function jumpQ(i){clearTimeout(autoTimer);qidx=i;multiSel=new Set();renderQuiz()}

function resetStats(){if(confirm('确定重置所有统计数据？')){stats={total:0,correct:0,streak:0,best:0,days:0,lastD:today()};wrongSet=new Set();history=[];saveAll();render()}}

/* Hearts */
function hearts(){
  for(let i=0;i<5;i++){
    const h=document.createElement('span');h.className='hp';h.textContent='♥';
    h.style.left=(30+Math.random()*40)+'%';h.style.bottom='30%';
    h.style.animationDelay=(i*.08)+'s';
    document.body.appendChild(h);setTimeout(()=>h.remove(),1200);
  }
}

/* Observe correct answers for hearts */
const origSelect=window._sel||selectOpt;
const origRender=renderQuiz;
renderQuiz=function(){
  origRender();
  const fb=document.querySelector('.feedback.ok');
  if(fb&&!fb._hearted){fb._hearted=true;hearts()}
};

/* Init */
render();
</script>
</body>
</html>
