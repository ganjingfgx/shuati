<!DOCTYPE html>  
<html lang="zh-CN">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">  
<title>Kitty 财务管理刷题宝</title>  
<link rel="preconnect" href="https://fonts.googleapis.com">  
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">  
<style>  
*{margin:0;padding:0;box-sizing:border-box}  
:root{  
  --pk-main:#FF9EB1;--pk-deep:#FF6B8B;--pk-bg:#FFF0F5;--pk-light:#FFD1DC;  
  --pk-soft:#FFF5F8;--text-main:#5A3E46;--text-sub:#997A83;  
  --success:#7EC8A0;--success-bg:#E8F8EF;--error:#FF7B7B;--error-bg:#FFF0F0;  
  --radius:16px;--shadow:0 4px 20px rgba(255,107,139,0.15);  
}  
html,body{height:100%;font-family:'Nunito',system-ui,-apple-system,sans-serif;  
  background:var(--pk-bg);color:var(--text-main);overflow:hidden}  
#app{height:100%;display:flex;flex-direction:position:relative;max-width:480px;margin:0 auto;  
  background:var(--pk-bg);position:relative;z-index:1}  
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}  
.screen.active{display:flex}  
.screen-body{flex:1;overflow-y:auto;padding:16px 16px 90px;scroll-behavior:smooth;  
  -webkit-overflow-scrolling:touch}  
  
/* === Particles === */  
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}  
.particle{position:absolute;animation:floatDown linear infinite;opacity:.45;font-size:18px}  
@keyframes floatDown{  
  0%{transform:translateY(-40px) rotate(0deg)}  
  100%{transform:translateY(calc(100vh + 40px)) rotate(360deg)}  
}  
  
/* === Header === */  
.header{padding:20px 16px 16px;text-align:center;position:relative}  
.header-cat{width:72px;height:72px;border-radius:50%;object-fit:cover;  
  border:3px solid #fff;box-shadow:0 4px 16px rgba(255,107,139,.25);margin-bottom:8px}  
.header h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--pk-deep),#FF8FAB);  
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}  
.header p{font-size:13px;color:var(--text-sub);margin-top:2px}  
  
/* === Cards === */  
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px;  
  box-shadow:var(--shadow);transition:transform .2s}  
.card:active{transform:scale(.98)}  
  
/* === Stats Row === */  
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}  
.stat-item{text-align:center;padding:12px 4px;background:#fff;border-radius:var(--radius);  
  box-shadow:0 2px 12px rgba(255,107,139,.1)}  
.stat-val{font-size:22px;font-weight:900;color:var(--pk-deep)}  
.stat-label{font-size:11px;color:var(--text-sub);margin-top:2px}  
  
/* === Filter Pills === */  
.filter-section{margin:14px 0 8px}  
.filter-label{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:8px;  
  display:flex;align-items:center;gap:6px}  
.pills{display:flex;flex-wrap:wrap;gap:8px}  
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;  
  border:2px solid var(--pk-light);background:#fff;color:var(--text-sub);  
  cursor:pointer;transition:all .2s;user-select:none}  
.pill.active{background:linear-gradient(135deg,var(--pk-main),var(--pk-deep));  
  color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(255,107,139,.3)}  
  
/* === Mode Buttons === */  
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}  
.mode-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;  
  padding:20px 12px;border-radius:var(--radius);border:none;cursor:pointer;  
  font-family:inherit;font-weight:800;font-size:14px;color:#fff;  
  box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .2s}  
.mode-btn:active{transform:scale(.95)}  
.mode-btn .icon{font-size:28px;margin-bottom:6px}  
.mode-btn.m1{background:linear-gradient(135deg,#FFB6C1,#FF69B4)}  
.mode-btn.m2{background:linear-gradient(135deg,#FFA07A,#FF6B8B)}  
.mode-btn.m3{background:linear-gradient(135deg,#DDA0DD,#C879C8)}  
.mode-btn.m4{background:linear-gradient(135deg,#FF8FAB,#FF4F8B)}  
  
/* === Bottom Nav === */  
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);  
  width:100%;max-width:480px;display:flex;background:#fff;  
  border-top:1px solid var(--pk-light);z-index:100;padding:6px 0 env(safe-area-inset-bottom,8px);  
  box-shadow:0 -2px 16px rgba(255,107,139,.1)}  
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;  
  cursor:pointer;transition:all .2s;color:var(--text-sub);font-size:10px;font-weight:700;  
  gap:2px;border:none;background:none;font-family:inherit}  
.nav-item.active{color:var(--pk-deep)}  
.nav-item .nav-icon{font-size:22px}  
.nav-badge{position:absolute;top:0;right:10px;width:16px;height:16px;  
  background:var(--error);color:#fff;font-size:9px;border-radius:50%;  
  display:flex;align-items:center;justify-content:center;font-weight:800}  
  
/* === Quiz Screen === */  
.quiz-header{display:flex;align-items:center;padding:12px 16px;gap:12px;  
  background:#fff;box-shadow:0 2px 12px rgba(255,107,139,.08)}  
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;  
  color:var(--pk-deep);font-weight:900}  
.quiz-title{flex:1;font-size:15px;font-weight:800;color:var(--text-main)}  
.quiz-counter{font-size:13px;color:var(--text-sub);font-weight:700}  
.progress-bar{height:4px;background:var(--pk-light);position:relative}  
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pk-main),var(--pk-deep));  
  border-radius:2px;transition:width .4s ease}  
  
.question-card{background:#fff;border-radius:var(--radius);padding:20px;  
  margin:14px 0;box-shadow:var(--shadow)}  
.q-badge{display:inline-flex;gap:6px;margin-bottom:12px}  
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:800}  
.badge-ch{background:var(--pk-light);color:var(--pk-deep)}  
.badge-type{background:#E8D5F5;color:#8B5FBF}  
.q-text{font-size:15px;line-height:1.8;color:var(--text-main);font-weight:600}  
.q-text sub{font-size:.75em}  
.q-text sup{font-size:.75em}  
  
/* === Options === */  
.options{display:flex;flex-direction:column;gap:10px;margin:14px 0}  
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;  
  border-radius:14px;border:2px solid var(--pk-light);background:#fff;  
  cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;  
  font-size:14px;line-height:1.6;color:var(--text-main);font-weight:600}  
.opt-btn:active{transform:scale(.97)}  
.opt-btn.selected{border-color:var(--pk-main);background:var(--pk-soft)}  
.opt-btn.correct{border-color:var(--success);background:var(--success-bg);  
  animation:correctPop .4s ease}  
.opt-btn.wrong{border-color:var(--error);background:var(--error-bg);  
  animation:wrongShake .4s ease}  
.opt-btn.disabled{pointer-events:none;opacity:.7}  
.opt-btn.show-correct{border-color:var(--success);background:var(--success-bg)}  
.opt-letter{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;  
  justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;  
  background:var(--pk-light);color:var(--pk-deep);transition:all .2s}  
.opt-btn.selected .opt-letter{background:var(--pk-main);color:#fff}  
.opt-btn.correct .opt-letter{background:var(--success);color:#fff}  
.opt-btn.wrong .opt-letter{background:var(--error);color:#fff}  
.opt-btn.show-correct .opt-letter{background:var(--success);color:#fff}  
.opt-text{flex:1;padding-top:2px}  
  
/* === True/False Options === */  
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}  
.tf-btn{padding:20px;border-radius:var(--radius);border:2px solid var(--pk-light);  
  background:#fff;cursor:pointer;font-size:18px;font-weight:900;  
  text-align:center;transition:all .2s;font-family:inherit}  
.tf-btn:active{transform:scale(.95)}  
.tf-btn.selected{border-color:var(--pk-main);background:var(--pk-soft)}  
.tf-btn.correct{border-color:var(--success);background:var(--success-bg)}  
.tf-btn.wrong{border-color:var(--error);background:var(--error-bg)}  
.tf-btn.show-correct{border-color:var(--success);background:var(--success-bg)}  
  
/* === Submit / Reveal === */  
.submit-btn{width:100%;padding:14px;border-radius:14px;border:none;  
  background:linear-gradient(135deg,var(--pk-main),var(--pk-deep));color:#fff;  
  font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;  
  box-shadow:0 4px 16px rgba(255,107,139,.3);transition:all .2s}  
.submit-btn:active{transform:scale(.97)}  
.submit-btn:disabled{opacity:.5;cursor:not-allowed}  
.submit-btn.secondary{background:#fff;color:var(--pk-deep);border:2px solid var(--pk-light);  
  box-shadow:none}  
  
/* === Explanation === */  
.explanation{background:var(--pk-soft);border-radius:14px;padding:14px 16px;  
  margin:14px 0;border-left:4px solid var(--pk-main);display:none}  
.explanation.show{display:block;animation:slideDown .3s ease}  
.exp-title{font-size:13px;font-weight:800;color:var(--pk-deep);margin-bottom:6px;  
  display:flex;align-items:center;gap:4px}  
.exp-text{font-size:13px;line-height:1.8;color:var(--text-main)}  
.exp-text sub{font-size:.75em}  
.exp-text sup{font-size:.75em}  
  
/* === Result Banner === */  
.result-banner{padding:12px;border-radius:14px;text-align:center;font-size:16px;  
  font-weight:900;margin:10px 0;display:none}  
.result-banner.show{display:block;animation:slideDown .3s ease}  
.result-banner.correct{background:var(--success-bg);color:var(--success)}  
.result-banner.wrong{background:var(--error-bg);color:var(--error)}  
  
/* === Nav Row === */  
.nav-row{display:flex;gap:10px;margin:10px 0;padding-bottom:20px}  
.nav-row .btn{flex:1;padding:12px;border-radius:14px;border:none;font-size:13px;  
  font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}  
.nav-row .btn:active{transform:scale(.95)}  
.btn-prev{background:#fff;color:var(--pk-deep);border:2px solid var(--pk-light)!important}  
.btn-next{background:linear-gradient(135deg,var(--pk-main),var(--pk-deep));color:#fff;  
  box-shadow:0 2px 12px rgba(255,107,139,.3)}  
.btn-fav{background:#fff;color:var(--pk-deep);border:2px solid var(--pk-light)!important;flex:0}  
.btn-fav.active{background:var(--pk-light);border-color:var(--pk-main)!important}  
  
/* === List Screens === */  
.list-empty{text-align:center;padding:60px 20px;color:var(--text-sub)}  
.list-empty .empty-icon{font-size:48px;margin-bottom:12px}  
.list-empty p{font-size:14px;font-weight:600}  
.list-item{background:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;  
  box-shadow:0 2px 12px rgba(255,107,139,.08);cursor:pointer;transition:all .2s;  
  display:flex;gap:12px;align-items:flex-start}  
.list-item:active{transform:scale(.98)}  
.list-item .li-badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:800;  
  white-space:nowrap;flex-shrink:0}  
.list-item .li-text{flex:1;font-size:13px;line-height:1.6;font-weight:600;  
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}  
.list-item .li-actions{display:flex;gap:6px;flex-shrink:0}  
.list-item .li-btn{width:32px;height:32px;border-radius:50%;border:none;  
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;  
  background:var(--pk-soft);transition:all .2s}  
.list-item .li-btn:active{transform:scale(.85)}  
  
/* === Stats Screen === */  
.ring-container{display:flex;justify-content:center;margin:20px 0}  
.ring{position:relative;width:140px;height:140px;border-radius:50%;  
  background:conic-gradient(var(--pk-main) 0deg,var(--pk-main) calc(var(--pct)*3.6deg),  
  var(--pk-light) calc(var(--pct)*3.6deg),var(--pk-light) 360deg);  
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}  
.ring::after{content:'';width:110px;height:110px;border-radius:50%;background:#fff;display:block}  
.ring-label{position:absolute;font-size:24px;font-weight:900;color:var(--pk-deep)}  
.ring-label span{display:block;font-size:11px;color:var(--text-sub);font-weight:700}  
  
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}  
.stat-card{background:#fff;border-radius:var(--radius);padding:16px;text-align:center;  
  box-shadow:var(--shadow)}  
.stat-card .sv{font-size:28px;font-weight:900;color:var(--pk-deep)}  
.stat-card .sl{font-size:12px;color:var(--text-sub);margin-top:4px;font-weight:700}  
  
.bar-chart{margin:14px 0}  
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}  
.bar-label{width:50px;font-size:12px;font-weight:800;color:var(--text-sub);text-align:right}  
.bar-track{flex:1;height:22px;background:var(--pk-light);border-radius:11px;overflow:hidden}  
.bar-fill{height:100%;border-radius:11px;background:linear-gradient(90deg,var(--pk-main),var(--pk-deep));  
  transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;  
  padding-right:8px;font-size:10px;color:#fff;font-weight:800;min-width:32px}  
  
/* === Animations === */  
@keyframes correctPop{  
  0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}  
}  
@keyframes wrongShake{  
  0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}  
}  
@keyframes slideDown{  
  from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}  
}  
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}  
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}  
@keyframes sparkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}  
  
.fade-in{animation:fadeIn .35s ease both}  
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);  
  background:rgba(90,62,70,.9);color:#fff;padding:14px 28px;border-radius:14px;  
  font-size:15px;font-weight:800;z-index:999;animation:pop .4s ease;pointer-events:none}  
  
/* Scrollbar */  
.screen-body::-webkit-scrollbar{width:4px}  
.screen-body::-webkit-scrollbar-track{background:transparent}  
.screen-body::-webkit-scrollbar-thumb{background:var(--pk-light);border-radius:4px}  
</style>  
</head>  
<body>  
<div id="app"></div>  
<div class="particles" id="particles"></div>  
<script>  
// ============================================================  
// QUESTION DATA  
// ============================================================  
const CH_NAMES = ['','第一章 筹资方式','第二章 资本成本与资本结构','第三章 项目投资','第四章 营运资金管理','第五章 股利分配'];  
const TYPE_NAMES = {S:'单选题',M:'多选题',F:'判断题',C:'计算题'};  
const LETTERS = 'ABCDEFGH';  
  
const Q = [  
// ========== Chapter 1 ==========  
{id:1,ch:1,tp:'S',q:'下列不属于债务筹资方式的是（）。',o:['企业自留资金','发行公司债券','融资租赁','利用商业信用'],a:0,e:'企业自留资金属于权益筹资；发行债券、融资租赁、商业信用均属于债务筹资方式。'},  
{id:2,ch:1,tp:'S',q:'按发行对象和上市地区，可将股票分为A股、B股、H股和N股等。下列说法不正确的是（）。',o:['A股是以人民币标明票面金额并以人民币认购和交易的股票','B股是以外币标明票面金额并以外币认购和交易的股票','H股为在香港上市的股票','N股是在纽约上市的股票'],a:1,e:'B股以人民币标明票面金额，以外币认购和交易，并非以外币标明面值。'},  
{id:3,ch:1,tp:'S',q:'普通股股东的权利不包括（）。',o:['公司管理权','分享盈余权','优先认股权','优先分配剩余财产权'],a:3,e:'优先分配剩余财产权属于优先股股东权利，普通股股东不享有。'},  
{id:4,ch:1,tp:'S',q:'下列关于普通股筹资的说法不正确的是（）。',o:['筹资风险大','能增加公司的信誉','筹资限制较少','容易分散控制权'],a:0,e:'普通股无固定还本付息压力，筹资风险小；债务筹资风险更高。'},  
{id:5,ch:1,tp:'S',q:'下列关于融资租赁的说法不正确的是（）。',o:['包括售后租回、直接租赁和杠杆租赁三种形式','从承租人的角度来看，杠杆租赁与其他租赁形式并无区别','从出租人的角度来看，杠杆租赁与其他租赁形式并无区别','在杠杆租赁中，如果出租人不能按期偿还借款，资产的所有权就要转归资金的出借者'],a:2,e:'从出租人角度，杠杆租赁仅投入部分资金、其余资金借入，与直接租赁存在本质区别。'},  
{id:6,ch:1,tp:'S',q:'某企业与银行商定的周转信贷额为200万元，承诺费率为0.5%，企业借款150万元，平均使用8个月，借款企业向银行支付承诺费（）元。',o:['10000','6000','5000','8000'],a:2,e:'未使用额度50万元全年：50×0.5%=0.25万元；150万元有4个月未使用：150×0.5%×4/12=0.25万元；合计0.5万元=5000元。'},  
  
{id:7,ch:1,tp:'M',q:'下列属于企业自留资金的有（）。',o:['发行股票取得的资金','提取公积金形成的资金','来源于未分配利润的资金','吸收直接投资取得的资金'],a:[1,2],e:'自留资金是企业内部积累形成，包括盈余公积和未分配利润；发行股票、吸收直接投资属于外部权益筹资。'},  
{id:8,ch:1,tp:'M',q:'企业筹资应遵循的原则包括（）。',o:['规模适当','筹措及时','来源合理','方式经济'],a:[0,1,2,3],e:'企业筹资四项基本原则：规模适当、筹措及时、来源合理、方式经济。'},  
{id:9,ch:1,tp:'M',q:'下列关于长期借款筹资的说法正确的有（）。',o:['筹资速度快','借款弹性较大','可以发挥财务杠杆的作用','限制性条款比较少'],a:[0,1,2],e:'长期借款限制性条款较多，D错误。'},  
{id:10,ch:1,tp:'M',q:'下列关于债券筹资优缺点的说法正确的有（）。',o:['资金成本较低','筹资风险低','限制条件多','可以发挥财务杠杆作用'],a:[0,2,3],e:'债券有固定还本付息义务，筹资风险高，B错误。'},  
{id:11,ch:1,tp:'M',q:'下列关于融资租赁的说法正确的有（）。',o:['租赁期满后，租赁资产一般要归还给出租人','对于同一项租赁业务，如果折现率相同，则先付租金一定小于后付租金','筹资速度快，财务风险小','资金成本较高'],a:[1,2,3],e:'融资租赁期满资产可留购、续租或退还，并非一般归还，A错误。'},  
{id:12,ch:1,tp:'M',q:'认股权证筹资的优点包括（）。',o:['为公司筹集额外的资金','促进其他筹资方式的运用','增加普通股收益','维护企业的控制权'],a:[0,1],e:'认股权证行权会稀释普通股收益、分散控制权，C、D错误。'},  
  
{id:13,ch:1,tp:'F',q:'企业筹资，是指企业根据其生产经营、对外投资以及调整资本结构等需要，通过一定的渠道，采取适当的方式，获取所需资金的一种行为。按照资金的来源渠道，可将企业筹资分为自有资金筹资和借入资金筹资。',a:1,e:'符合企业筹资的定义与按资金来源的分类标准。'},  
{id:14,ch:1,tp:'F',q:'企业采用借入资金的方式筹集资金，到期要归还本金和支付利息，相对权益性筹资而言，投资方承担的风险较大，资金成本较低。',a:0,e:'债务筹资中，筹资方承担还本付息压力，风险更大；投资方风险更小，对应资金成本低于权益筹资。题干说"投资方承担风险较大"错误。'},  
{id:15,ch:1,tp:'F',q:'筹资渠道解决的是资金来源问题，筹资方式则解决通过何种方式取得资金的问题。一定的筹资方式只适用于某一特定的筹资渠道，但是同一渠道的资金往往可采用不同的方式取得。',a:0,e:'同一筹资方式可对应多种筹资渠道，同一渠道也可采用多种筹资方式。'},  
{id:16,ch:1,tp:'F',q:'补偿性余额是银行要求借款人在银行中保持按贷款限额或实际借款额的一定百分比计算的最低存款余额。',a:1,e:'符合补偿性余额的定义。'},  
{id:17,ch:1,tp:'F',q:'信贷额度是银行从法律上承诺向企业提供不超过某一最高限额的贷款。',a:0,e:'周转信贷协定具有法律约束力；普通信贷额度不具备法律强制效力。'},  
  
{id:18,ch:1,tp:'C',q:'【补偿性余额下实际利率计算】\n\n某企业从银行取得借款200万元（名义借款额），期限一年，名义利率8%。银行规定补偿性余额为10%，求实际利率。',s:'<b>实际利率 = 名义利率 ÷（1 - 补偿性余额比例）</b><br>= 8% ÷ (1 - 10%) ≈ <b>8.89%</b>'},  
{id:19,ch:1,tp:'C',q:'【融资租赁等额年金法租金计算】\n\nD公司为扩大经营规模融资租入一台机床，该机床的价款为120万元，租期10年，租赁公司的融资成本为20万元，租赁手续费为15万元。双方商定采用15%的折现率。\n（1）如果采用等额年金法，每年年初支付，则每期租金为多少？\n（2）如果采用等额年金法，每年年末支付，则每期租金为多少？',s:'租赁现值总额 = 120万元<br><br><b>（1）先付租金（年初支付）</b><br>每期租金 = 120 ÷ [(P/A,15%,10)×(1+15%)]<br>= 120 ÷ (5.0188×1.15) ≈ <b>20.83万元</b><br><br><b>（2）后付租金（年末支付）</b><br>每期租金 = 120 ÷ (P/A,15%,10)<br>= 120 ÷ 5.0188 ≈ <b>23.91万元</b>'},  
{id:20,ch:1,tp:'C',q:'【不同条件下融资租赁租金计算】\n\n某企业向租赁公司租入一套设备，设备原价100万元，租期5年，预计残值为设备的5%，年利率为10%，租赁手续费为设备价值的2%。要求计算下列四种情况下每次应付租金的数额：\n1）残值归出租人，租金每年末支付\n2）残值归出租人，租金每年初支付\n3）残值归承租人，租金每年末支付\n4）残值归承租人，租金每年初支付',s:'综合折现率 = 10% + 2% = 12%<br>残值 = 100×5% = 5万元<br><br><b>1）残值归出租人，年末支付</b><br>租金现值 = 100 - 5×(P/F,12%,5) = 100 - 5×0.5674 = 97.163万元<br>年租金 = 97.163 ÷ 3.6048 ≈ <b>26.95万元</b><br><br><b>2）残值归出租人，年初支付</b><br>年租金 = 97.163 ÷ (3.6048×1.12) ≈ <b>24.07万元</b><br><br><b>3）残值归承租人，年末支付</b><br>年租金 = 100 ÷ 3.6048 ≈ <b>27.74万元</b><br><br><b>4）残值归承租人，年初支付</b><br>年租金 = 100 ÷ (3.6048×1.12) ≈ <b>24.77万元</b>'},  
  
// ========== Chapter 2 ==========  
{id:21,ch:2,tp:'S',q:'下列关于综合资金成本的说法不正确的是（）。',o:['包括加权平均资金成本和边际资金成本','边际资金成本采用加权平均法计算，其权数为账面价值权数','当企业拟筹资进行某项目投资时，应以边际资金成本作为评价该投资项目可行性的经济指标','边际资金成本，是指资金每增加一个单位而增加的成本'],a:1,e:'边际资金成本的权数为目标价值权数，而非账面价值权数。'},  
{id:22,ch:2,tp:'S',q:'已知企业目标资本结构中长期债务的比重为20%，债务资金的增加额在0~10000元范围内，其利率维持5%不变。该企业与此相关的筹资总额分界点为（）元。',o:['5000','20000','50000','200000'],a:2,e:'筹资总额分界点 = 某资金成本对应的筹资限额 ÷ 该资金占总资本比重 = 10000÷20% = 50000元。'},  
{id:23,ch:2,tp:'S',q:'在实务中，计算加权平均资金成本时通常采用的权数为（）。',o:['目标价值权数','市场价值权数','账面价值权数','评估价值权数'],a:2,e:'实务中通常以账面价值为权数计算加权平均资本成本，数据易获取。'},  
{id:24,ch:2,tp:'S',q:'某企业希望在筹资计划中确定期望的加权平均资金成本，为此需要计算个别资金占全部资金的比重。此时，最适宜采用的计算基础是（）。',o:['目前的账面价值','目前的市场价值','预计的账面价值','目标市场价值'],a:3,e:'确定目标资本结构下的加权平均资本成本，应采用目标市场价值权数。'},  
{id:25,ch:2,tp:'S',q:'A企业负债资金的市场价值为4000万元，股东权益的市场价值为6000万元。债务的税前资金成本为15%，股票的β为1.41，企业所得税税率为34%，市场风险溢酬9.2%，国债的利率为11%。则加权平均资金成本为（）。',o:['23.97%','9.9%','18.34%','18.67%'],a:2,e:'股权资本成本=11%+1.41×9.2%=23.972%；债务税后资本成本=15%×(1-34%)=9.9%；WACC=4000/10000×9.9%+6000/10000×23.972%≈18.34%。'},  
{id:26,ch:2,tp:'S',q:'某企业生产一种产品，该产品的年产销量为20000件，售价为40元/件，单位变动成本为20元，则该产品的边际贡献总额是（）元。',o:['200000','120000','400000','800000'],a:2,e:'边际贡献总额=销量×(单价-单位变动成本)=20000×(40-20)=400000元。'},  
{id:27,ch:2,tp:'S',q:'普通股每股税后利润变动率相当于息税前利润变动率的倍数表示的是（）。',o:['经营杠杆系数','财务杠杆系数','复合杠杆系数','以上均错'],a:1,e:'财务杠杆系数=每股收益变动率÷息税前利润变动率。'},  
{id:28,ch:2,tp:'S',q:'企业在经营决策时对经营成本中固定成本的利用称为（）。',o:['财务杠杆','总杠杆','联合杠杆','营业杠杆'],a:3,e:'营业杠杆（经营杠杆）是对经营固定成本的利用。'},  
{id:29,ch:2,tp:'S',q:'下列关于经营杠杆的说法不正确的是（）。',o:['经营杠杆，是指由于固定成本的存在而导致税前利润变动率大于产销量变动率的杠杆效应','经营杠杆本身并不是利润不稳定的根源，但是经营杠杆扩大了市场和生产等不确定因素对利润变动的影响','在其他因素一定的情况下，固定成本越高，经营杠杆系数越大','按照简化公式计算经营杠杆系数时，本期边际贡献的大小并不影响本期的经营杠杆系数'],a:0,e:'经营杠杆导致息税前利润变动率大于产销量变动率，而非税前利润。'},  
{id:30,ch:2,tp:'S',q:'某公司的经营杠杆系数为2，预计息税前盈余将增长10%，在其他条件不变的情况下，销售量将增长（）。',o:['5%','10%','15%','20%'],a:0,e:'经营杠杆系数=息税前利润变动率÷销量变动率；销量变动率=10%÷2=5%。'},  
{id:31,ch:2,tp:'S',q:'如果企业一定期间内的固定生产经营成本和固定财务费用均不为零，则由上述因素共同作用而导致的杠杆效应属于（）。',o:['经营杠杆效应','财务杠杆效应','复合杠杆效应','风险杠杆效应'],a:2,e:'经营杠杆+财务杠杆共同作用形成复合杠杆（总杠杆）。'},  
{id:32,ch:2,tp:'S',q:'某公司总资本额度为100万元，负债比率为40%，利率为10%，当销售收入为120万元时，EBIT为20万元，则财务杠杆系数为（）。',o:['2','1.75','1.5','1.25'],a:3,e:'利息=100×40%×10%=4万元；DFL=EBIT÷(EBIT-I)=20÷(20-4)=1.25。'},  
{id:33,ch:2,tp:'S',q:'某企业全部资本150万元，所有权资本占55%，负债利率12%，当销售额为100万元时，EBIT为20万元，则财务杠杆系数为（）。',o:['1.68','2.5','1.15','2'],a:0,e:'负债总额=150×(1-55%)=67.5万元；利息=67.5×12%=8.1万元；DFL=20÷(20-8.1)≈1.68。'},  
  
{id:34,ch:2,tp:'M',q:'下列各因素中，其不确定性影响经营风险的有（）。',o:['市场需求','负债','销售价格','对价格的调整能力'],a:[0,2,3],e:'负债影响财务风险，而非经营风险。'},  
{id:35,ch:2,tp:'M',q:'下列各项中，可用于确定企业最优资本结构的方法有（）。',o:['高低点法','公司价值分析法','比较资金成本法','每股收益无差别点法'],a:[1,2,3],e:'高低点法是成本习性分析方法，不用于最优资本结构决策。'},  
{id:36,ch:2,tp:'M',q:'吸收一定比例的负债资金，可能产生的结果有（）。',o:['降低企业资金成本','加大企业复合风险','加大企业财务风险','提高每股收益'],a:[0,1,2,3],e:'负债资金成本低于权益资金，可降低综合资本成本；同时增加财务风险和复合风险；盈利情况下可提高每股收益。'},  
{id:37,ch:2,tp:'M',q:'下列各项中，影响资本结构的有（）。',o:['企业财务状况','企业产品销售情况','所得税税率的高低','利率水平的变动趋势'],a:[0,1,2,3],e:'以上四项均为影响资本结构的重要因素。'},  
{id:38,ch:2,tp:'M',q:'下列有关资本结构理论的表述正确的有（）。',o:['净收益理论认为，负债程度为100%时，企业价值将达到最大','净营业收益理论认为，负债多少与企业价值无关','MM理论认为，在不考虑所得税的情况下，风险相同的企业，其价值不受负债程度的影响；但在考虑所得税的情况下，负债越多，企业价值越大','等级筹资理论认为，公司筹资偏好内部筹资，如果需要外部筹资，则偏好债务筹资'],a:[0,1,2,3],e:'四项表述均符合对应资本结构理论的核心观点。'},  
{id:39,ch:2,tp:'M',q:'下列关于财务风险的说法正确的有（）。',o:['亦称筹资风险','是指企业在经营活动过程中与筹资有关的风险','如果企业固定财务费用为零，则没有财务风险，财务杠杆系数为0','在其他因素一定的情况下，固定财务费用越高，财务杠杆系数越大'],a:[0,1,3],e:'固定财务费用为零时，财务杠杆系数为1，而非0，C错误。'},  
  
{id:40,ch:2,tp:'F',q:'边际贡献等于销售收入与销售成本的差额，息税前利润等于边际贡献与固定成本的差额，其中的固定成本中不包括利息费用。',a:0,e:'边际贡献=销售收入-变动成本，而非销售成本。题干说"销售成本"错误。'},  
{id:41,ch:2,tp:'F',q:'最优资本结构是使企业筹资能力最强、财务风险最小的资本结构。',a:0,e:'最优资本结构是在一定条件下使企业加权平均资本成本最低、企业价值最大的资本结构。'},  
{id:42,ch:2,tp:'F',q:'资本结构，是指企业各种资本的构成及其比例关系。资本结构问题总的来说是负债资本的比例问题，即负债在企业全部资本中所占的比重。',a:1,e:'资本结构核心是负债资本的比例问题。'},  
{id:43,ch:2,tp:'F',q:'财务杠杆，是指由于固定财务费用的存在而导致普通股每股利润变动率大于息税前利润变动率的杠杆效应。只要在企业的筹资方式中有固定财务费用支出的债务，就会存在财务杠杆效应，财务杠杆会加大财务风险，企业负债比重越大，财务杠杆效应越强，财务风险越大。',a:1,e:'符合财务杠杆的定义与作用规律。'},  
{id:44,ch:2,tp:'F',q:'在应用比较资金成本法进行企业最佳资本结构决策时，如果息税前利润大于每股利润无差别点的息税前利润，企业通过负债筹资比权益资本筹资更为有利，因为将使企业资金成本降低。',a:0,e:'每股收益无差别点法判断的是每股收益高低，而非资金成本高低。'},  
{id:45,ch:2,tp:'F',q:'当息税前利润大于零，单位边际贡献不变时，除非固定成本为零或业务量无穷大，否则息税前利润的变动率大于销售量的变动率。',a:1,e:'经营杠杆效应下，息税前利润变动率大于销量变动率。'},  
  
{id:46,ch:2,tp:'C',q:'【普通股资本成本计算】\n\n海红股份有限公司普通股现行市价为每股20元，现在要增发新股80000股，预计筹资费用率为6%，第一年每股发放股利2元，股利增加率为5%。测算本次发行普通股的资本成本。',s:'<b>普通股资本成本 = 第一年股利 ÷ [股价×(1-筹资费率)] + 股利增长率</b><br>= 2 ÷ [20×(1-6%)] + 5%<br>= 10.64% + 5% = <b>15.64%</b>'},  
{id:47,ch:2,tp:'C',q:'【个别资本成本计算】\n\n试计算下列情况下的资本成本：\n（1）10年期债券，面值1000元，票面利率11%，发行费用为发行价格1125元的5%，企业所得税税率为33%。\n（2）增发普通股，每股净资产的账面价值为15元，上一年度现金股利为每股1.8元，每股盈利在可预见的未来维持7%的增长率，目前公司普通股的股价为每股27.5元，预计股票发行价格与股价一致，发行费用为收入的5%。\n（3）优先股面值为150元，现金股利为9%，发行费用为其当前价格175元的12%。',s:'<b>（1）债券资本成本</b><br>= [1000×11%×(1-33%)] ÷ [1125×(1-5%)]<br>= 73.7 ÷ 1068.75 ≈ <b>6.90%</b><br><br><b>（2）普通股资本成本</b><br>= [1.8×(1+7%)] ÷ [27.5×(1-5%)] + 7%<br>= 7.37% + 7% = <b>14.37%</b><br><br><b>（3）优先股资本成本</b><br>= [150×9%] ÷ [175×(1-12%)]<br>= 13.5 ÷ 154 ≈ <b>8.77%</b>'},  
{id:48,ch:2,tp:'C',q:'【长期借款与债券资本成本】\n\n某公司向银行借入一笔长期借款，年利率为10%，借款手续费率为0.5%。另外，公司发行期限为8年的债券，面值为2000元，溢价发行，实际价格为面值的110%，票面利率为12%，每年末付息一次，筹资费率为3%。企业所得税率为25%。求公司长期借款和发行债券的资本成本。',s:'<b>（1）长期借款资本成本</b><br>= [10%×(1-25%)] ÷ (1-0.5%) ≈ <b>7.54%</b><br><br><b>（2）债券资本成本</b><br>发行价格 = 2000×110% = 2200元<br>= [2000×12%×(1-25%)] ÷ [2200×(1-3%)]<br>= 180 ÷ 2134 ≈ <b>8.43%</b>'},  
{id:49,ch:2,tp:'C',q:'【加权平均资本成本计算】\n\n假设某公司的资本来源包括：\n（1）100万股面值为1元的普通股。预期股利是每股0.10元，以后每年将以10%的速度增长。该普通股目前的市场价值是每股1.8元。\n（2）面值为800000元的债券，三年后到期，每年末按面值的11%支付利息，三年后以面值购回。目前市场价格是每张95元（面值100元）。\n公司所得税税率为33%。求加权平均资本成本。',s:'<b>（1）普通股资本成本</b> = 0.1÷1.8 + 10% ≈ 15.56%<br>普通股市场价值 = 100×1.8 = 180万元<br><br><b>（2）债券税后资本成本</b><br>求税前成本：95 = 11/(1+r) + 11/(1+r)² + 111/(1+r)³，解得r≈13.11%<br>税后资本成本 = 13.11%×(1-33%) ≈ 8.78%<br>债券市场价值 = 80×0.95 = 76万元<br><br><b>（3）WACC</b><br>总市值 = 180+76 = 256万元<br>WACC = (180/256)×15.56% + (76/256)×8.78% ≈ <b>13.55%</b>'},  
{id:50,ch:2,tp:'C',q:'【杠杆系数计算】\n\n某公司1998年的资本结构是普通股10000元，长期债券2000元（年利率15%），长期借款77000元（年利率10%）。当年实现销售收入120000元，变动成本60000元，固定成本36000元。企业适用的所得税率为30%。\n要求计算：（1）息税前利润；（2）经营杠杆系数；（3）财务杠杆系数；（4）复合杠杆系数。',s:'<b>（1）EBIT</b> = 120000 - 60000 - 36000 = <b>24000元</b><br><br><b>（2）DOL</b><br>边际贡献 = 120000 - 60000 = 60000元<br>DOL = 60000 ÷ 24000 = <b>2.5</b><br><br><b>（3）DFL</b><br>利息 = 2000×15% + 77000×10% = 8000元<br>DFL = 24000 ÷ (24000-8000) = <b>1.5</b><br><br><b>（4）DTL</b> = 2.5×1.5 = <b>3.75</b>'},  
{id:51,ch:2,tp:'C',q:'【财务杠杆系数计算】\n\n某企业资本总额为2000万元，负债和权益筹资额的比例为2:3，债务利率为12%，当前销售额1000万元，息税前利润为200万，求财务杠杆系数。',s:'债务总额 = 2000×2/5 = 800万元<br>利息 = 800×12% = 96万元<br>DFL = 200 ÷ (200-96) ≈ <b>1.92</b>'},  
{id:52,ch:2,tp:'C',q:'【经营计划改进决策】\n\n某公司年销售额1000万元，变动成本率60%，全部固定成本和费用120万元，平均总资产2500万元，资产负债率40%，负债的平均利息率8%，假设所得税率为25%。该公司拟改变经营计划，追加投资200万元，每年固定成本增加20万元，可以使销售额增加20%，并使变动成本率下降至55%。该公司以提高权益净利率同时降低复合杠杆系数作为改进经营计划的标准。\n要求：\n（1）计算目前情况的权益净利率和复合杠杆系数；\n（2）所需资金以追加实收资本取得，计算权益净利率和复合杠杆系数；\n（3）所需资金以12%的利率借入，计算权益净利率和复合杠杆系数；\n（4）如果应该改变经营计划，计算改变计划之后的经营杠杆系数。',s:'<b>（1）目前情况</b><br>边际贡献=1000×40%=400万；利息=2500×40%×8%=80万<br>固定经营成本=120-80=40万；EBIT=400-40=360万<br>净利润=(360-80)×75%=210万；所有者权益=2500×60%=1500万<br>权益净利率=210/1500=<b>14%</b>；DTL=400/(360-80)=<b>1.43</b><br><br><b>（2）追加实收资本方案</b><br>销售额=1200万；边际贡献=1200×45%=540万<br>固定经营成本=40+20=60万；EBIT=540-60=480万<br>净利润=(480-80)×75%=300万；权益=1500+200=1700万<br>权益净利率=300/1700=<b>17.65%</b>；DTL=540/(480-80)=<b>1.35</b><br>✓ 应改变。<br><br><b>（3）借入资金方案</b><br>利息=80+200×12%=104万<br>净利润=(480-104)×75%=282万<br>权益净利率=282/1500=<b>18.8%</b>；DTL=540/(480-104)=<b>1.44</b><br>✗ DTL上升，不采纳。<br><br><b>（4）改变后DOL</b>（权益方案）<br>DOL = 540/480 = <b>1.125</b>'},  
{id:53,ch:2,tp:'C',q:'【每股收益无差别点】\n\n某企业目前拥有资本1000万元，其结构为：负债资本20%（年利息20万元），普通股权益资本80%（发行普通股10万股，每股面值80元）。现准备追加筹资400万元，有两种方案：\n（1）全部发行普通股，增发5万股，每股面值80元。\n（2）全部筹措长期债务，利率为10%，利息为40万元。\n企业追加筹资后，息税前利润预计为160万元，所得税税率为33%。\n要求：计算每股收益无差别点的每股收益并确定企业的筹资方案。',s:'设每股收益无差别点EBIT为EBIT*<br><br>(EBIT*-20)×(1-33%) / (10+5) = (EBIT*-20-40)×(1-33%) / 10<br><br>解得：<b>EBIT* = 140万元</b><br><br>预计EBIT=160万 > 140万，应选择<b>债务筹资方案（方案2）</b><br><br>无差别点每股收益 = (140-20)×67% / 15 = <b>5.36元/股</b>'},  
  
// ========== Chapter 3 ==========  
{id:54,ch:3,tp:'S',q:'用未来报酬的总现值，减去投资额的总现值，计算出（）。',o:['投资利润率','投资回收期','获利指数','净现值'],a:3,e:'净现值=未来现金净流量现值-原始投资额现值。'},  
{id:55,ch:3,tp:'S',q:'某投资方案，当折现率为16%时，其净现值为338元；当折现率为18%时，其净现值为-22元。该方案的内含报酬率为（）。',o:['15.88%','16.3%','17.88%','18.1%'],a:2,e:'内插法：IRR=16%+338/(338+22)×(18%-16%)≈17.88%。'},  
{id:56,ch:3,tp:'S',q:'某企业准备进行一个固定资产投资项目，有效使用期为4年，无残值，总共投资120万元。每年净利润为20万元，该项目的投资回收期为（）。',o:['4年','6年','2.4年','3年'],a:2,e:'年折旧=120÷4=30万元；年NCF=20+30=50万元；投资回收期=120÷50=2.4年。'},  
{id:57,ch:3,tp:'S',q:'计量投资方案的增量现金流量时，一般不需要考虑方案（）。',o:['可能的未来成本','之间的差额成本','有关的机会成本','动用现有资产的账面成本'],a:3,e:'账面成本属于沉没成本，与增量现金流量决策无关。'},  
{id:58,ch:3,tp:'S',q:'关于项目投资，下列表达式不正确的是（）。',o:['计算期＝建设期＋运营期','运营期＝试产期＋达产期','达产期是指从投产至达到设计预期水平的时期','从投产日到终结点之间的时间间隔称为运营期'],a:2,e:'达产期是指生产运营达到设计预期水平后的时间；从投产至达到设计水平为试产期。'},  
{id:59,ch:3,tp:'S',q:'计算投资项目现金流量时，下列说法不正确的是（）。',o:['必须考虑现金流量的增量','尽量利用未来的会计利润数据','不能考虑沉没成本因素','考虑项目对企业其他部门的影响'],a:1,e:'项目投资决策以现金流量为基础，而非会计利润。'},  
{id:60,ch:3,tp:'S',q:'项目投资现金流量表（全部投资现金流量表）中不包括（）。',o:['所得税前净现金流量','累计所得税前净现金流量','借款本金偿还','所得税后净现金流量'],a:2,e:'全部投资现金流量表假设资金全部为自有，不考虑还本付息支出。'},  
{id:61,ch:3,tp:'S',q:'下列各项中，不影响项目投资收益率的是（）。',o:['建设期资本化利息','运营期利息费用','营业收入','营业成本'],a:1,e:'投资收益率基于息税前利润计算，不考虑运营期利息费用。'},  
{id:62,ch:3,tp:'S',q:'某项目建设期为零，全部投资均于建设起点一次投入，投产后的净现金流量每年均为100万元，按照内部收益率和项目计算期计算的年金现值系数为4.2，则该项目的静态投资回收期为（）年。',o:['4.2','2.1','8.4','无法计算'],a:0,e:'建设期为零且年金形式的项目，静态回收期=年金现值系数=4.2年。'},  
  
{id:63,ch:3,tp:'M',q:'从企业角度看，固定资产投资属于（）。',o:['直接投资','生产性投资','对内投资','周转资本投资'],a:[0,1,2],e:'固定资产投资属于直接投资、生产性投资、对内投资；周转资本投资指流动资金投资。'},  
{id:64,ch:3,tp:'M',q:'与其他形式的投资相比，项目投资（）。',o:['投资内容独特','投资数额多','投资风险小','变现能力强'],a:[0,1],e:'项目投资数额大、回收期长、变现能力差、投资风险高。'},  
{id:65,ch:3,tp:'M',q:'下列表达式中不正确的包括（）。',o:['原始投资＝固定资产投资＋无形资产投资＋其他资产投资','初始投资＝建设投资','项目总投资＝建设投资＋建设期资本化利息','项目总投资＝建设投资＋流动资金投资'],a:[0,1,2,3],e:'原始投资=建设投资+流动资金投资；建设投资=固定资产+无形资产+其他资产投资；项目总投资=原始投资+建设期资本化利息。四个表述均不完全正确。'},  
{id:66,ch:3,tp:'M',q:'不同类型的投资项目，其现金流量的具体内容存在差异，不过也有共同之处，下列说法正确的有（）。',o:['现金流入量中均包括增加的营业收入','现金流出量中均包括增加的经营成本','现金流入量中均包括回收的流动资金','现金流出量中均包括增加的税款'],a:[0,1,3],e:'单纯固定资产投资项目不涉及流动资金回收，C错误。'},  
  
{id:67,ch:3,tp:'F',q:'投资，是指企业为了在未来可预见的时期内获得收益或使资金增值，在一定时期向一定领域的标的物投放足够数额的资金或实物等货币等价物的经济行为。',a:1,e:'符合投资的定义。'},  
{id:68,ch:3,tp:'F',q:'流动资金投资，是指项目投产前后分次或一次投放于流动资产项目的投资额，又称垫支流动资金或营运资金投资。',a:1,e:'符合流动资金投资的定义。'},  
{id:69,ch:3,tp:'F',q:'原始投资的资金投入方式包括一次投入和分次投入。如果投资行为只涉及一个年度，则一定属于一次投入。',a:0,e:'同一年度内分次投入也属于分次投入。'},  
{id:70,ch:3,tp:'F',q:'归还借款本金和支付利息导致现金流出企业，所以，如果项目的资金包括借款，则计算项目的现金流量时，应该扣除还本付息支出。',a:0,e:'全部投资现金流量表不考虑还本付息，站在全部投资角度评价。'},  
{id:71,ch:3,tp:'F',q:'净现金流量又称现金净流量，是指在项目运营期内由每年现金流入量与同年现金流出量之间的差额所形成的序列指标。',a:0,e:'净现金流量覆盖整个项目计算期，不仅是运营期。'},  
{id:72,ch:3,tp:'F',q:'如果项目的净现值大于0，则获利指数一定大于1。',a:1,e:'获利指数=未来现金流量现值÷原始投资现值，NPV>0则PI>1。'},  
{id:73,ch:3,tp:'F',q:'当项目建设期为零，全部投资均于建设起点一次投入，投产后的净现金流量表现为普通年金的形式时，可以直接利用年金现值系数计算内部收益率。',a:1,e:'此时令原始投资=年NCF×年金现值系数，反查系数表即可求IRR。'},  
  
{id:74,ch:3,tp:'C',q:'【现金流量表与投资指标计算】\n\n某企业拟进行一项固定资产投资（均在建设期内投入），现金流量表（部分）如下：\n项目        建设期0  建设期1  运营期2  运营期3  运营期4  运营期5\n净现金流量  -800     -200     100      600      B        1000\n累计净现金  -800     -1000    -900     A        100      1100\n折现净现金  -800     -180     C        437.4    262.44   590.49\n\n要求：\n（1）计算表中用英文字母表示的项目的数值；\n（2）计算或确定：①静态投资回收期；②净现值；③原始投资及原始投资现值；④净现值率；⑤获利指数；\n（3）评价该项目的财务可行性。',s:'<b>（1）字母计算</b><br>A = -900+600 = -300<br>B = 100-(-300) = 400<br>折现率由第1年-200折现后-180，得系数0.9，折现率≈11.11%<br>C = 100×0.81 = 81<br><br><b>（2）指标</b><br>① 静态回收期 = 3+300/400 = 3.75年<br>② NPV = -800-180+81+437.4+262.44+590.49 = <b>391.33万元</b><br>③ 原始投资=1000万，原始投资现值=980万<br>④ 净现值率 = 391.33/980 ≈ 39.93%<br>⑤ 获利指数 = 1.40<br><br><b>（3）</b>NPV>0，PI>1，项目<b>具备财务可行性</b>。'},  
{id:75,ch:3,tp:'C',q:'【完整工业项目投资决策】\n\n某公司计划购置一套新设备用于新产品的生产。新设备需一次性投入450000元，预计可使用5年，5年后设备残值收入为50000元。使用新设备后，公司年收入增加300000元。每年的设备维护费和经营成本为165000元。假设新设备折旧采用直线法，公司适用的所得税税率为40%，银行贷款利率为14%。\n要求计算：（1）每年的折旧费；（2）每年的现金净流量；（3）该项投资的投资回收期；（4）该项投资的净现值，并判断是否应进行投资。',s:'<b>（1）年折旧费</b> = (450000-50000)÷5 = <b>80000元</b><br><br><b>（2）年NCF</b><br>年净利润 = (300000-165000-80000)×(1-40%) = 33000元<br>NCF<sub>1-4</sub> = 33000+80000 = <b>113000元</b><br>NCF<sub>5</sub> = 113000+50000 = <b>163000元</b><br><br><b>（3）投资回收期</b><br>= 3+(450000-113000×3)÷113000 ≈ <b>3.98年</b><br><br><b>（4）NPV</b><br>= 113000×(P/A,14%,4)+163000×(P/F,14%,5)-450000<br>= 113000×2.9137+163000×0.5194-450000<br>= 329248.1+84662.2-450000 = <b>-36089.7元</b><br>NPV<0，<b>不应进行投资</b>。'},  
{id:76,ch:3,tp:'C',q:'【固定资产更新决策】\n\n某公司正考虑用一台新设备替换旧设备。\n旧设备原购置成本40000元，已使用5年，估计还可以使用5年，已提折旧20000元，期满后无残值，现在变卖可得价款20000元。使用该设备每年可获收入50000元，每年付现成本30000元。\n新设备购置成本60000元，估计可使用5年，期满后有残值10000元。使用新设备后，每年收入80000元，每年付现成本40000元。\n该公司资本成本为10%，所得税税率为40%，新设备均采用直线法计提折旧。\n要求：作出是否应该用新设备代替旧设备的投资决策。',s:'<b>继续使用旧设备：</b><br>年折旧=20000÷5=4000元<br>年净利润=(50000-30000-4000)×60%=9600元<br>年NCF=9600+4000=13600元<br>NPV=13600×(P/A,10%,5)=13600×3.7908=51554.88元<br><br><b>更换新设备：</b><br>初始投资=60000-20000=40000元<br>年折旧=(60000-10000)÷5=10000元<br>年净利润=(80000-40000-10000)×60%=18000元<br>NCF<sub>1-4</sub>=18000+10000=28000元；NCF<sub>5</sub>=28000+10000=38000元<br>NPV=28000×3.1699+38000×0.6209-40000=<b>72351.4元</b><br><br>更换新设备NPV更高，<b>应当替换</b>。'},  
  
// ========== Chapter 4 ==========  
{id:77,ch:4,tp:'S',q:'现金循环周期的变化会直接影响所需营运资金的数额。一般来说，下列会导致营运资金数额变小的是（）。',o:['存货周转期变长','应收账款周转期变长','应付账款周转期变长','应付账款周转期变短'],a:2,e:'现金周转期=存货周转期+应收账款周转期-应付账款周转期；应付账款周转期越长，现金周转期越短，营运资金需求越小。'},  
{id:78,ch:4,tp:'S',q:'确定最佳现金持有量的模式主要有成本分析模式和存货模式，两种模式中均考虑的成本费用是（）。',o:['机会成本','短缺成本','管理费用','转换成本'],a:0,e:'成本分析模式考虑机会成本、管理成本、短缺成本；存货模式考虑机会成本和转换成本；共同考虑的是机会成本。'},  
{id:79,ch:4,tp:'S',q:'下列表达式不正确的是（）。',o:['应收账款机会成本＝赊销业务所需资金×资金成本率','赊销业务所需资金＝应收账款平均余额×变动成本率','应收账款平均余额＝平均每日赊销额×平均收账天数','应收账款机会成本＝应收账款平均余额×资金成本率'],a:3,e:'应收账款机会成本=应收账款平均余额×变动成本率×资金成本率，D缺少变动成本率。'},  
{id:80,ch:4,tp:'S',q:'影响信用标准的基本因素不包括（）。',o:['同行业竞争对手的情况','企业承担风险的能力','客户的资信程度','预计的坏账损失率'],a:3,e:'预计坏账损失率是信用标准的结果，而非影响因素。'},  
{id:81,ch:4,tp:'S',q:'下列不属于存货成本的是（）。',o:['短缺成本','缺货成本','进货成本','储存成本'],a:0,e:'存货成本包括进货成本、储存成本、缺货成本；短缺成本是现金成本的构成。'},  
{id:82,ch:4,tp:'S',q:'下列关于存货成本的说法不正确的是（）。',o:['进货成本主要由存货的购置成本和进货费用构成','进货费用又称订货成本','购置成本主要由存货的进价和进货费用构成','缺货成本，是指因存货不足而给企业造成的停产损失、延误发货的信誉损失及丧失销售机会的损失等'],a:2,e:'购置成本即进价成本；进货费用是订货成本，二者共同构成进货成本。C将进货费用归入购置成本是错误的。'},  
  
{id:83,ch:4,tp:'M',q:'流动资产投资又称经营性投资，与固定资产投资相比，下列说法正确的是（）。',o:['投资回收期短','易变现','具有波动性','周转快'],a:[0,1,2,3],e:'流动资产投资回收期短、变现能力强、随经营波动、周转速度快。'},  
{id:84,ch:4,tp:'M',q:'与长期负债筹资相比，流动负债筹资（）。',o:['速度快','弹性大','成本高','风险小'],a:[0,1],e:'流动负债筹资速度快、弹性大、成本低、风险高。'},  
{id:85,ch:4,tp:'M',q:'营运资金周转，是指企业的营运资金从现金投入生产经营开始，到最终转化为现金为止的过程。现金的周转过程主要包括（）。',o:['存货周转期','应付账款周转期','应收账款周转期','预收账款周转期'],a:[0,1,2],e:'现金周转过程包括存货周转期、应收账款周转期、应付账款周转期。'},  
{id:86,ch:4,tp:'M',q:'现金，是指在生产过程中暂时停留在货币形态的资金，下列属于现金的有（）。',o:['库存现金','银行存款','银行本票','银行汇票'],a:[0,1,2,3],e:'广义现金包括库存现金、银行存款和其他货币资金（银行本票、银行汇票等）。'},  
{id:87,ch:4,tp:'M',q:'加快现金回收的方法包括（）。',o:['邮政信箱法','银行业务集中法','合理利用现金"浮游量"','采用汇票付款'],a:[0,1],e:'C、D属于现金支出管理方法；A、B属于加速现金回收方法。'},  
{id:88,ch:4,tp:'M',q:'下列属于应收账款成本的有（）。',o:['机会成本','管理成本','收账费用','坏账成本'],a:[0,1,2,3],e:'应收账款成本包括机会成本、管理成本（含收账费用）、坏账成本。'},  
{id:89,ch:4,tp:'M',q:'实行数量折扣的条件下，决策的相关成本包括（）。',o:['变动性储存成本','变动性进货费用','存货的进价成本','缺货成本'],a:[0,1,2],e:'数量折扣模型考虑进价成本、订货成本、储存成本，不允许缺货。'},  
  
{id:90,ch:4,tp:'F',q:'企业持有一定数量的现金主要是基于交易动机、预防动机和投资动机。',a:0,e:'现金持有动机包括交易动机、预防动机、投机动机，而非"投资动机"。'},  
{id:91,ch:4,tp:'F',q:'应收账款，是企业因对外赊销产品、材料、供应劳务等应向购货或接受劳务单位收取的款项。应收账款主要功能是促进销售。',a:1,e:'应收账款本质是商业信用，核心功能是促进销售、减少存货。'},  
{id:92,ch:4,tp:'F',q:'信用政策即应收账款的管理政策，是指企业为应收账款投资进行规划与控制而确立的基本原则与行为规范，包括信用标准、信用期限和收账政策三部分内容。',a:0,e:'信用政策包括信用标准、信用条件、收账政策；信用期限属于信用条件。'},  
{id:93,ch:4,tp:'F',q:'存货经济进货批量基本模型中，决定存货经济进货批量的成本因素主要包括变动性进货费用、变动性储存成本以及缺货成本。',a:0,e:'基本模型假设不允许缺货，不考虑缺货成本。'},  
{id:94,ch:4,tp:'F',q:'允许缺货的情况下，能够使变动性进货费用、变动性储存成本以及缺货成本总和最低的批量便是经济进货批量。',a:1,e:'允许缺货模型下，相关成本包括订货成本、储存成本、缺货成本。'},  
  
{id:95,ch:4,tp:'C',q:'【经济进货批量与数量折扣决策】\n\n某企业每年需耗用A材料90000件，单位材料年存储成本4元，平均每次进货费用为1800元，A材料全年平均单价为40元。\n（1）假定满足经济进货批量基本模型的全部假设前提：求经济进货批量、年度最佳进货批数、相关进货费用、相关存储成本、相关总成本、平均占用资金。\n（2）如果每次购买批量在10000~20000件之内可享受1%的价格折扣；每次购买批量在20000件以上，价格优惠2%，确定经济进货批量。',s:'<b>（1）基本模型</b><br>Q* = √(2×90000×1800÷4) = <b>9000件</b><br>最佳批数 = 90000÷9000 = 10次<br>相关进货费用 = 10×1800 = 18000元<br>相关存储成本 = (9000÷2)×4 = 18000元<br>相关总成本 = 36000元<br>平均占用资金 = (9000÷2)×40 = 180000元<br><br><b>（2）数量折扣决策</b><br>• 9000件（无折扣）：总成本=90000×40+36000=3636000元<br>• 10000件（1%折扣）：进价3564000+订货16200+储存20000=3600200元<br>• 20000件（2%折扣）：进价3528000+订货8100+储存40000=3576100元<br><b>批量20000件总成本最低。</b>'},  
{id:96,ch:4,tp:'C',q:'【应收账款机会成本计算】\n\n某企业预测2008年度销售收入为5400万元，现销与赊销比例为4：1，应收账款平均收账天数为40天，变动成本率为60%，企业的资金成本率为10%，一年按360天计算。\n要求：（1）计算2008年度赊销额；（2）计算应收账款的平均余额；（3）计算维持赊销业务所需要的资金额；（4）计算应收账款的机会成本额；（5）若应收账款平均余额需控制在60万元，应收账款平均收账天数应调整为多少天？',s:'<b>（1）</b>赊销额 = 5400×1/5 = <b>1080万元</b><br><b>（2）</b>应收账款平均余额 = 1080÷360×40 = <b>120万元</b><br><b>（3）</b>赊销所需资金 = 120×60% = <b>72万元</b><br><b>（4）</b>机会成本 = 72×10% = <b>7.2万元</b><br><b>（5）</b>平均收账天数 = 60÷(1080÷360) = <b>20天</b>'},  
{id:97,ch:4,tp:'C',q:'【最佳现金持有量（存货模式）】\n\n已知：某公司现金收支稳定，预计全年（按360天计算）现金需要量为100万元，现金与有价证券的转换成本为每次250元，有价证券年利率为5%。\n要求：（1）计算最佳现金持有量；（2）计算最低全年现金管理相关总成本及其中的转换成本和持有机会成本；（3）计算全年有价证券交易次数和交易间隔期。',s:'<b>（1）最佳现金持有量</b><br>C* = √(2×1000000×250÷5%) = <b>100000元 = 10万元</b><br><br><b>（2）最低相关总成本</b><br>TC = √(2×1000000×250×5%) = <b>5000元</b><br>转换成本 = 持有机会成本 = 5000÷2 = 2500元<br><br><b>（3）</b>交易次数 = 1000000÷100000 = <b>10次</b><br>交易间隔期 = 360÷10 = <b>36天</b>'},  
{id:98,ch:4,tp:'C',q:'【信用条件决策】\n\nA公司正在研究修改现行的信用条件。现有三个备选方案：\n甲方案(n/90)：年赊销额1440万，收账费用20万，固定成本32万，坏账损失率2.5%\n乙方案(n/60)：年赊销额1530万，收账费用25万，固定成本35万，坏账损失率3%\n丙方案(2/30,n/90)：年赊销额1620万，收账费用30万，固定成本40万，坏账损失率4%\n已知变动成本率80%，资金成本率10%。甲方案平均收账90天；乙方案平均收账120天；丙方案40%客户享受折扣，40%信用期付款，20%延期60天付款。\n要求：（1）计算丙方案的平均收账天数、机会成本和现金折扣；（2）选择最优方案。',s:'<b>（1）丙方案</b><br>平均收账天数 = 30×40%+90×40%+150×20% = 78天<br>应收账款平均余额 = 1620÷360×78 = 351万<br>机会成本 = 351×80%×10% = 28.08万<br>现金折扣 = 1620×40%×2% = 12.96万<br><br><b>（2）三方案比较</b><br>甲：边际贡献288-固定32-机会28.8-坏账36-收账20=<b>171.2万</b><br>乙：边际贡献306-固定35-机会40.8-坏账45.9-收账25=<b>159.3万</b><br>丙：边际贡献324-固定40-机会28.08-坏账64.8-收账30-折扣12.96=<b>148.16万</b><br><br><b>甲方案税前收益最高，应选择甲方案。</b>'},  
  
// ========== Chapter 5 ==========  
{id:99,ch:5,tp:'S',q:'下列关于股利理论的说法不正确的是（）。',o:['MM理论是建立在完全市场理论之上的','股利重要论认为投资者更喜欢现金股利，而不愿意将收益留存在公司内部','所得税差异理论认为企业应当采用高股利政策','根据代理理论可知，较多地派发现金股利可以通过资本市场的监督减少代理成本'],a:2,e:'所得税差异理论认为资本利得税低于股利税，企业应采用低股利政策。'},  
{id:100,ch:5,tp:'S',q:'下列关于剩余股利政策的说法不正确的是（）。',o:['剩余股利政策，是指公司生产经营所获得的净收益首先应满足公司的资金需求，如果还有剩余，则派发股利；如果没有剩余，则不派发股利','剩余股利政策有助于保持最佳的资本结构，实现企业价值的长期最大化','剩余股利政策不利于投资者安排收入与支出','剩余股利政策一般适用于公司初创阶段'],a:0,e:'剩余股利政策优先满足目标资本结构下的权益资金需求，而非全部资金需求。'},  
{id:101,ch:5,tp:'S',q:'下列关于固定或稳定增长的股利政策的说法不正确的是（）。',o:['有利于公司在资本市场上树立良好的形象、增强投资者信心','有利于稳定公司股价','该政策要求公司对未来的盈利和支付能力能做出较准确的判断','固定或稳定增长的股利政策一般适用于经营比较稳定或正处于成长期的企业，可以被长期采用'],a:3,e:'该政策在公司成长阶段适用，但长期采用会面临较大支付压力，难以长期维持。'},  
{id:102,ch:5,tp:'S',q:'下列关于股票股利的说法不正确的是（）。',o:['不会导致公司的财产减少','会增加流通在外的股票数量','不会改变公司股东权益总额，但会改变股东权益的构成','会提高股票的每股价值'],a:3,e:'股票股利增加股数，会稀释每股收益，降低每股价值。'},

let currentTab = 'home';  
let quizActive = false;  
let quizQs = [];  
let quizIdx = 0;

let quizSelected = []; // for multi  
let quizResult = null; // null, 'correct', 'wrong'  
let calcRevealed = false;  
let typeFilter = 'all';  
let autoTimer = null;  
  
// Persistence  
let wrongIds = JSON.parse(localStorage.getItem('kitty_wrong') || '[]');  
let favIds = JSON.parse(localStorage.getItem('kitty_fav') || '[]');  
let stats = JSON.parse(localStorage.getItem('kitty_stats') || '{"total":0,"correct":0,"daily":{},"streak":0,"lastDate":null}');  
  
function saveWrong(){localStorage.setItem('kitty_wrong', JSON.stringify(wrongIds));}  
function saveFav(){localStorage.setItem('kitty_fav', JSON.stringify(favIds));}  
function saveStats(){localStorage.setItem('kitty_stats', JSON.stringify(stats));}  
function today(){return new Date().toISOString().slice(0,10);}  
function addStat(correct){  
  const t = today();  
  if(stats.lastDate !== t){  
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);  
    if(stats.lastDate === yesterday.toISOString().slice(0,10)) stats.streak++;  
    else stats.streak = 1;  
    stats.lastDate = t;  
  }  
  stats.total++;  
  if(correct) stats.correct++;  
  if(!stats.daily[t]) stats.daily[t] = {t:0,c:0};  
  stats.daily[t].t++;  
  if(correct) stats.daily[t].c++;  
  saveStats();  
}

// PARTICLES

function createParticles(){  
  const c = document.getElementById('particles');  
  c.innerHTML = '';  
  const emos = ['💕','🎀','🌸','💖','💗','✿','🩷','♡'];  
  for(let i=0;i<15;i++){  
    const s = document.createElement('span');  
    s.className = 'particle';  
    s.textContent = emos[Math.floor(Math.random()*emos.length)];  
    s.style.left = Math.random()*100+'%';  
    s.style.animationDuration = (10+Math.random()*15)+'s';  
    s.style.animationDelay = Math.random()*12+'s';  
    s.style.fontSize = (14+Math.random()*14)+'px';  
    c.appendChild(s);  
  }  
}

const app = document.getElementById('app');  
  
function render(){  
  clearTimeout(autoTimer);  
  if(quizActive) renderQuiz();  
  else renderScreen();  
  updateNavBadges();  
}  
  
function renderScreen(){  
  let body = '';  
  switch(currentTab){  
    case 'home': body = renderHome(); break;  
    case 'wrong': body = renderList('wrong'); break;  
    case 'fav': body = renderList('fav'); break;  
    case 'stats': body = renderStats(); break;  
  }  
  app.innerHTML = `  
    <div class="screen active">  
      <div class="screen-body">${body}</div>  
    </div>  
    ${renderBottomNav()}`;  
  bindScreenEvents();  
}

function renderQuiz(){  
  if(quizQs.length === 0){  
    quizActive = false;  
    render();  
    showToast('没有符合条件的题目');  
    return;  
  }  
  const q = quizQs[quizIdx];  
  const progress = ((quizIdx+1)/quizQs.length*100).toFixed(1);  
  const chName = CH_NAMES[q.ch] || '';  
  const typeName = TYPE_NAMES[q.q? q.tp : 'S'] || '';  
  const isFav = favIds.includes(q.id);  
  let optionsHtml = '';  
  
  if(q.tp === 'S'){  
    optionsHtml = '<div class="options">'+q.o.map((o,i)=>{  
      let cls = 'opt-btn';  
      if(quizAnswered){  
        if(i === q.a) cls += ' correct';  
        else if(quizSelected.includes(i) && i !== q.a) cls += ' wrong';  
        else cls += ' disabled';  
      } else if(quizSelected.includes(i)) cls += ' selected';  
      return `<button class="${cls}" data-idx="${i}"><span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${o}</span></button>`;  
    }).join('')+'</div>';  
  } else if(q.tp === 'M'){  
    optionsHtml = '<div class="options">'+q.o.map((o,i)=>{  
      let cls = 'opt-btn';  
      if(quizAnswered){  
        const isCorrect = q.a.includes(i);  
        const isSelected = quizSelected.includes(i);  
        if(isCorrect) cls += isSelected ? ' correct' : ' show-correct';  
        else if(isSelected) cls += ' wrong';  
        else cls += ' disabled';  
      } else if(quizSelected.includes(i)) cls += ' selected';  
      return `<button class="${cls}" data-idx="${i}"><span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${o}</span></button>`;  
    }).join('')+'</div>';  
    if(!quizAnswered) optionsHtml += `<button class="submit-btn" id="submitBtn" ${quizSelected.length===0?'disabled':''}>确认提交</button>`;  
  } else if(q.tp === 'F'){  
    optionsHtml = `<div class="tf-row">  
      <button class="tf-btn ${quizAnswered?(q.a===1?'correct':(quizSelected.includes(1)?'wrong':'disabled')):(quizSelected.includes(1)?'selected':'')}" data-val="1">⭕ 对 / 正确</button>  
      <button class="tf-btn ${quizAnswered?(q.a===0?'correct':(quizSelected.includes(0)?'wrong':'disabled')):(quizSelected.includes(0)?'selected':'')}" data-val="0">❌ 错 / 错误</button>  
    </div>`;  
  } else if(q.tp === 'C'){  
    optionsHtml = `<div style="margin:14px 0">  
      <button class="submit-btn ${calcRevealed?'secondary':''}" id="revealBtn">${calcRevealed?'✅ 已查看解析':'📖 查看解析'}</button>  
    </div>  
    <div class="explanation ${calcRevealed?'show':''}" style="display:${calcRevealed?'block':'none'}">  
      <div class="exp-title">📝 详细解答</div>  
      <div class="exp-text">${q.s||''}</div>  
    </div>  
    ${calcRevealed?`<div style="display:flex;gap:10px;margin:10px 0">  
      <button class="submit-btn" style="flex:1;background:${quizResult==='correct'?'var(--success)':'#fff'};color:${quizResult==='correct'?'#fff':'var(--success)'};border:2px solid var(--success)" id="masteredBtn">✅ 已掌握</button>  
      <button class="submit-btn" style="flex:1;background:${quizResult==='wrong'?'var(--error)':'#fff'};color:${quizResult==='wrong'?'#fff':'var(--error)'};border:2px solid var(--error)" id="notMasteredBtn">❌ 未掌握</button>  
    </div>`:''}`;  
  }  
  
  const showExp = quizAnswered && q.tp !== 'C';  
  const resultHtml = quizAnswered && q.tp !== 'C' ?  
    `<div class="result-banner ${quizResult} show">${quizResult==='correct'?'🎉 答对啦！太棒了～':'😅 答错啦，看看解析吧～'}</div>` : '';  
  
  app.innerHTML = `  
    <div class="screen active" style="display:flex;flex-direction:column">  
      <div class="quiz-header">  
        <button class="back-btn" id="backBtn">←</button>  
        <div class="quiz-title">${quizIdx+1} / ${quizQs.length}</div>  
        <div class="quiz-counter">${Math.round(progress)}%</div>  
      </div>  
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>  
      <div class="screen-body">  
        <div class="question-card fade-in">  
          <div class="q-badge">  
            <span class="badge badge-ch">${chName.replace(/第.章\s?/,'')}</span>  
            <span class="badge badge-type">${TYPE_NAMES[q.tp]}</span>  
          </div>  
          <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>  
        </div>  
        ${optionsHtml}  
        ${resultHtml}  
        <div class="explanation ${showExp?'show':''}" style="display:${showExp?'block':'none'}" id="explanation">  
          <div class="exp-title">💡 解析</div>  
          <div class="exp-text">${q.e||''}</div>  
        </div>  
        <div class="nav-row">  
          <button class="btn btn-prev" id="prevBtn" ${quizIdx===0?'disabled':''}>⬅ 上一题</button>  
          <button class="btn btn-fav ${isFav?'active':''}" id="favBtn">${isFav?'💗':'🤍'}</button>  
          <button class="btn btn-next" id="nextBtn">${quizIdx<quizQs.length-1?'下一题 ➡':'完成 🎉'}</button>  
        </div>  
      </div>  
    </div>`;  
  bindQuizEvents();  
}  
  
function renderList(mode){  
  const ids = mode==='wrong' ? wrongIds : favIds;  
  const items = Q.filter(q=>ids.includes(q.id));  
  const title = mode==='wrong' ? '📕 错题本' : '💗 收藏夹';  
  if(items.length === 0) return `  
    <div class="header" style="padding-bottom:8px"><h1>${title}</h1></div>  
    <div class="list-empty"><div class="empty-icon">${mode==='wrong'?'🎉':'📌'}</div><p>${mode==='wrong'?'暂无错题，继续保持！':'暂无收藏题目'}</p></div>`;  
  let html = `<div class="header" style="padding-bottom:8px"><h1>${title}</h1><p>共 ${items.length} 题</p></div>`;  
  const badgeCls = {S:'badge-type',M:'badge-type',F:'badge-ch',C:'badge-ch'};  
  items.forEach(q=>{  
    html += `<div class="list-item fade-in" data-id="${q.id}">  
      <span class="li-badge ${badgeCls[q.tp]}" style="background:var(--pk-light);color:var(--pk-deep)">${TYPE_NAMES[q.tp]}</span>  
      <div class="li-text">${q.q.replace(/\n/g,' ').substring(0,60)}...</div>  
      <div class="li-actions">  
        <button class="li-btn" data-action="${mode==='wrong'?'removeWrong':'removeFav'}" data-id="${q.id}">✕</button>  
      </div>  
    </div>`;  
  });  
  return html;  
}  
  
function renderStats(){  
  const accuracy = stats.total > 0 ? Math.round(stats.correct/stats.total*100) : 0;  
  // Chapter accuracy  
  const chStats = {};  
  for(let i=1;i<=5;i++){  
    const chQs = Q.filter(q=>q.ch===i && q.tp!=='C');  
    chStats[i] = {total:chQs.length, name:CH_NAMES[i].replace(/第.章\s?/,'')};  
  }  
  // Daily trend (last 7 days)  
  const days = [];  
  for(let i=6;i>=0;i--){  
    const d = new Date(); d.setDate(d.getDate()-i);  
    const key = d.toISOString().slice(0,10);  
    const label = (d.getMonth()+1)+'/'+d.getDate();  
    const dayData = stats.daily[key] || {t:0,c:0};  
    days.push({label, total:dayData.t, correct:dayData.c});  
  }  
  const maxDay = Math.max(...days.map(d=>d.total),1);  
  
  return `  
    <div class="header" style="padding-bottom:8px"><h1>📊 学习统计</h1></div>  
    <div class="card fade-in" style="text-align:center">  
      <div class="ring-container">  
        <div class="ring" style="--pct:${accuracy}">  
          <div class="ring-label">${accuracy}%<span>正确率</span></div>  
        </div>  
      </div>  
    </div>  
    <div class="stat-grid fade-in">  
      <div class="stat-card"><div class="sv">${stats.total}</div><div class="sl">总刷题数</div></div>  
      <div class="stat-card"><div class="sv">${stats.correct}</div><div class="sl">答对题数</div></div>  
      <div class="stat-card"><div class="sv">${stats.streak}</div><div class="sl">连续打卡(天)</div></div>  
      <div class="stat-card"><div class="sv">${wrongIds.length}</div><div class="sl">待巩固题数</div></div>  
    </div>  
    <div class="card fade-in">  
      <div style="font-size:14px;font-weight:800;margin-bottom:12px;color:var(--text-main)">📈 近7日刷题趋势</div>  
      <div class="bar-chart">  
        ${days.map(d=>`<div class="bar-row">  
          <div class="bar-label">${d.label}</div>  
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(d.total/maxDay*100,0)}%">${d.total}</div></div>  
        </div>`).join('')}  
      </div>  
    </div>  
    <div class="card fade-in">  
      <div style="font-size:14px;font-weight:800;margin-bottom:12px;color:var(--text-main)">📚 题库概览</div>  
      <div class="bar-chart">  
        ${Object.values(chStats).map(ch=>`<div class="bar-row">  
          <div class="bar-label" style="width:80px;font-size:11px">${ch.name.substring(0,4)}</div>  
          <div class="bar-track"><div class="bar-fill" style="width:${ch.total/1.24}%">${ch.total}题</div></div>  
        </div>`).join('')}  
      </div>  
    </div>`;  
}  
  
function renderBottomNav(){  
  const tabs = [{id:'home',icon:'🏠',label:'首页'},{id:'wrong',icon:'📕',label:'错题本'},  
    {id:'fav',icon:'💗',label:'收藏'},{id:'stats',icon:'📊',label:'统计'}];  
  return `<div class="bottom-nav">${tabs.map(t=>{  
    const count = t.id==='wrong'?wrongIds.length:t.id==='fav'?favIds.length:0;  
    return `<button class="nav-item ${currentTab===t.id?'active':''}" data-tab="${t.id}">  
      <span class="nav-icon">${t.icon}</span>${t.label}  
      ${count>0?`<span class="nav-badge">${count>99?'99+':count}</span>`:''}  
    </button>`;  
  }).join('')}</div>`;  
}  
  
function updateNavBadges(){}  
  
// ============================================================  
// EVENT BINDING  
// ============================================================  
function bindScreenEvents(){  
  // Type filter  
  document.querySelectorAll('#typeFilter .pill').forEach(p=>{  
    p.onclick = ()=>{ typeFilter = p.dataset.type; render(); };  
  });  
  // Mode buttons  
  document.querySelectorAll('.mode-btn').forEach(b=>{  
    b.onclick = ()=> startQuiz(b.dataset.mode);  
  });  
  // Nav tabs  
  document.querySelectorAll('.nav-item').forEach(n=>{  
    n.onclick = ()=>{  
      currentTab = n.dataset.tab;  
      quizActive = false;  
      render();  
    };  
  });  
  // List item actions  
  document.querySelectorAll('.li-btn').forEach(b=>{  
    b.onclick = (e)=>{  
      e.stopPropagation();  
      const id = parseInt(b.dataset.id);  
      if(b.dataset.action === 'removeWrong'){  
        wrongIds = wrongIds.filter(x=>x!==id); saveWrong();  
      } else {  
        favIds = favIds.filter(x=>x!==id); saveFav();  
      }  
      render();  
    };  
  });  
  // List item click -> start mini quiz  
  document.querySelectorAll('.list-item').forEach(item=>{  
    item.onclick = ()=>{  
      const id = parseInt(item.dataset.id);  
      const mode = currentTab==='wrong'?'wrong':'fav';  
      startQuiz(mode, id);  
    };  
  });  
}  
  
function bindQuizEvents(){  
  // Back  
  const backBtn = document.getElementById('backBtn');  
  if(backBtn) backBtn.onclick = ()=>{ quizActive = false; render(); };  
  
  // Prev / Next  
  const prevBtn = document.getElementById('prevBtn');  
  const nextBtn = document.getElementById('nextBtn');  
  if(prevBtn) prevBtn.onclick = ()=>{ if(quizIdx>0){quizIdx--;quizAnswered=false;quizSelected=[];quizResult=null;calcRevealed=false;renderQuiz();} };  
  if(nextBtn) nextBtn.onclick = ()=> nextQuestion();  
  
  // Fav  
  const favBtn = document.getElementById('favBtn');  
  if(favBtn) favBtn.onclick = ()=>{  
    const q = quizQs[quizIdx];  
    if(favIds.includes(q.id)){favIds=favIds.filter(x=>x!==q.id);}  
    else{favIds.push(q.id);}  
    saveFav();  
    renderQuiz();  
  };  
  
  const q = quizQs[quizIdx];  
  if(!q) return;  
  
  // Single choice  
  if(q.tp === 'S' && !quizAnswered){  
    document.querySelectorAll('.opt-btn').forEach(b=>{  
      b.onclick = ()=> handleSingle(parseInt(b.dataset.idx));  
    });  
  }  
  
  // Multiple choice  
  if(q.tp === 'M'){  
    if(!quizAnswered){  
      document.querySelectorAll('.opt-btn').forEach(b=>{  
        b.onclick = ()=>{  
          const idx = parseInt(b.dataset.idx);  
          if(quizSelected.includes(idx)) quizSelected=quizSelected.filter(x=>x!==idx);  
          else quizSelected.push(idx);  
          renderQuiz();  
        };  
      });  
      const submitBtn = document.getElementById('submitBtn');  
      if(submitBtn) submitBtn.onclick = ()=> handleMulti();  
    }  
  }  
  
  // True/False  
  if(q.tp === 'F' && !quizAnswered){  
    document.querySelectorAll('.tf-btn').forEach(b=>{  
      b.onclick = ()=> handleTF(parseInt(b.dataset.val));  
    });  
  }  
  
  // Calculation  
  if(q.tp === 'C'){  
    const revealBtn = document.getElementById('revealBtn');  
    if(revealBtn) revealBtn.onclick = ()=>{ calcRevealed=true; renderQuiz(); };  
    const masteredBtn = document.getElementById('masteredBtn');  
    const notMasteredBtn = document.getElementById('notMasteredBtn');  
    if(masteredBtn) masteredBtn.onclick = ()=>{ quizResult='correct'; addStat(true); renderQuiz(); showToast('已标记为掌握 ✨'); };  
    if(notMasteredBtn) notMasteredBtn.onclick = ()=>{  
      quizResult='wrong'; addStat(false);  
      if(!wrongIds.includes(q.id)){wrongIds.push(q.id);saveWrong();}  
      renderQuiz(); showToast('继续加油～');  
    };  
  }  
  
  // Nav item events in quiz  
  document.querySelectorAll('.nav-item').forEach(n=>{  
    n.onclick = ()=>{  
      currentTab = n.dataset.tab;  
      quizActive = false;  
      render();  
    };  
  });  
}  
  
// ============================================================  
// ANSWER HANDLERS  
// ============================================================  
function handleSingle(idx){  
  const q = quizQs[quizIdx];  
  quizSelected = [idx];  
  quizAnswered = true;  
  const correct = idx === q.a;  
  quizResult = correct ? 'correct' : 'wrong';  
  addStat(correct);  
  if(!correct && !wrongIds.includes(q.id)){wrongIds.push(q.id);saveWrong();}  
  renderQuiz();  
  if(correct){ autoTimer = setTimeout(()=>nextQuestion(), 1200); }  
}  
  
function handleMulti(){  
  const q = quizQs[quizIdx];  
  quizAnswered = true;  
  const sortedSel = [...quizSelected].sort();  
  const sortedAns = [...q.a].sort();  
  const correct = JSON.stringify(sortedSel) === JSON.stringify(sortedAns);  
  quizResult = correct ? 'correct' : 'wrong';  
  addStat(correct);  
  if(!correct && !wrongIds.includes(q.id)){wrongIds.push(q.id);saveWrong();}  
  renderQuiz();  
  if(correct){ autoTimer = setTimeout(()=>nextQuestion(), 1200); }  
}  
  
function handleTF(val){  
  const q = quizQs[quizIdx];  
  quizSelected = [val];  
  quizAnswered = true;  
  const correct = val === q.a;  
  quizResult = correct ? 'correct' : 'wrong';  
  addStat(correct);  
  if(!correct && !wrongIds.includes(q.id)){wrongIds.push(q.id);saveWrong();}  
  renderQuiz();  
  if(correct){ autoTimer = setTimeout(()=>nextQuestion(), 1200); }  
}  
  
function nextQuestion(){  
  if(quizIdx < quizQs.length - 1){  
    quizIdx++;  
    quizAnswered = false;  
    quizSelected = [];  
    quizResult = null;  
    calcRevealed = false;  
    renderQuiz();  
  } else {  
    quizActive = false;  
    showToast('🎉 本轮完成！');  
    render();  
  }  
}  
  
// ============================================================  
// QUIZ START  
// ============================================================  
function startQuiz(mode, startId){  
  let qs = [];  
  if(mode === 'seq'){  
    qs = filterQs();  
  } else if(mode === 'rand'){  
    qs = filterQs();  
    for(let i=qs.length-1;i>0;i--){  
      const j=Math.floor(Math.random()*(i+1));  
      [qs[i],qs[j]]=[qs[j],qs[i]];  
    }  
  } else if(mode === 'wrong'){  
    qs = Q.filter(q=>wrongIds.includes(q.id));  
    if(startId !== undefined){  
      const idx = qs.findIndex(q=>q.id===startId);  
      if(idx>=0){qs=[qs[idx]];}  
    }  
  } else if(mode === 'fav'){  
    qs = Q.filter(q=>favIds.includes(q.id));  
    if(startId !== undefined){  
      const idx = qs.findIndex(q=>q.id===startId);  
      if(idx>=0){qs=[qs[idx]];}  
    }  
  }  
  if(qs.length===0){  
    showToast('没有题目哦～');  
    return;  
  }  
  quizQs = qs;  
  quizIdx = 0;  
  quizAnswered = false;  
  quizSelected = [];  
  quizResult = null;  
  calcRevealed = false;  
  quizActive = true;  
  render();  
}  
  
function filterQs(){  
  if(typeFilter === 'all') return [...Q];  
  return Q.filter(q=>q.tp === typeFilter);  
}  
  
// ============================================================  
// UTILS  
// ============================================================  
function showToast(msg){  
  const existing = document.querySelector('.toast');  
  if(existing) existing.remove();  
  const t = document.createElement('div');  
  t.className = 'toast';  
  t.textContent = msg;  
  document.body.appendChild(t);  
  setTimeout(()=>t.remove(),1500);  
}  
  
// ============================================================  
// INIT  
// ============================================================  
createParticles();  
render();  
</script>
